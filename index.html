function updateOre(){
  const g=id=>parseFloat(document.getElementById(id)?.value||'0')||0;
  const s=g('in_sinter'), p=g('in_pellet'), d=g('in_dri');
  const ore=Math.max(0,100-s-p-d);
  const el=document.getElementById('in_ore'); if(el) el.value=ore.toFixed(1);
  const tot=document.getElementById('ore-total');
  if(tot){const t=s+p+ore+d; tot.textContent=t.toFixed(1); tot.style.color=Math.abs(t-100)<0.1?'var(--grn)':'var(--red)';}
}



function calcBurden(){
  const g=id=>{const el=document.getElementById(id);if(!el)return 0;const v=parseFloat(el.value);return isNaN(v)?0:v;};
  const D=IOD||DB.io||{}; const rm=DB.rm||{};
  // Use ref values with proper fallbacks — prevents blank output when saved value is 0
  const coke1=(document.getElementById('in_coke1') ? g('in_coke1') : 0) || D.ref_coke1 || D.coke1 || 2000;
  const coke2=(document.getElementById('in_coke2') ? g('in_coke2') : 0) || D.ref_coke2 || D.coke2 || 3000;
  const coke_base=coke1+coke2;
  // Show total coke base immediately
  const cbD=document.getElementById('in_coke_base_display');
  if(cbD){cbD.textContent=coke_base.toFixed(0);cbD.style.color='var(--teal)';}
  const chr=(g('in_chr')||0) || D.chr||6;
  const oc=(g('in_oc')||0) || D.ore_coke||4.4;
  const sinter=(g('in_sinter')||0) || D.sinter||75;
  const pellet=g('in_pellet'); // 0 is valid for pellet
  const ore_pct=(g('in_ore')||0) || D.ore||25;
  const dri_pct=g('in_dri'); // 0 is valid for DRI
  const pci=(g('in_pci')||0) || D.pci||150;
  const nc=(g('in_nc')||0) || D.nc||20;
  const hm_si=(g('in_hmsi')||0) || D.hm_si||0.9;
  const hm_fe=(g('in_hmfe')||0) || D.hm_fe||94.5;
  const limestone=g('in_ls'); // field ID is in_ls
  const dolomite=g('in_dol'); // field ID is in_dol
  const tprod=(g('in_tprod')||0) || D.target_prod||3200;
  const th_dia=g('in_throat_dia')||D.throat_dia||5.0;
  const bl_dia=g('in_belly_dia')||D.belly_dia||9.75;
  // ore mix
  const ore_batch_kg=oc*coke_base;
  const sinter_kg=ore_batch_kg*sinter/100;
  const ore_kg=ore_batch_kg*ore_pct/100;
  const pellet_kg=ore_batch_kg*pellet/100;
  const dri_kg=ore_batch_kg*dri_pct/100;
  const total_ore_kg=sinter_kg+ore_kg+pellet_kg+dri_kg;
  const rS=rm.Sinter||{fe:57.88,sio2:5.3,cao:11.0,mgo:2.1,al2o3:2.9};
  const rO=rm.Ore||{fe:62.77};const rP=rm.Pellets||{fe:63.81};const rD=rm.DRI||{fe:54.99};
  const fe_in=sinter_kg*rS.fe/100+ore_kg*rO.fe/100+pellet_kg*rP.fe/100+dri_kg*rD.fe/100;
  const hm_per_charge=fe_in/(hm_fe/100)/1000;
  // coke rate
  const coke_rate=hm_per_charge>0?(coke_base/1000)/hm_per_charge*1000:0;
  const fuel_rate=coke_rate+pci+nc;
  // slag
  const sio2_in=sinter_kg*(rS.sio2||5.3)/100+ore_kg*(rO.sio2||3.27)/100;
  const cao_in=sinter_kg*(rS.cao||11.0)/100;
  const mgo_in=sinter_kg*(rS.mgo||2.1)/100;
  const al2o3_in=sinter_kg*(rS.al2o3||2.9)/100+ore_kg*(rO.al2o3||2.4)/100;
  const rLS=rm.Limestone||{cao:49.59}; const rDol=rm.Dolomite||{mgo:17.85,cao:29.38};
  const ls_kg=limestone*hm_per_charge; const dl_kg=dolomite*hm_per_charge;
  const cao_tot=cao_in+ls_kg*(rLS.cao||49.59)/100+dl_kg*(rDol.cao||29.38)/100;
  const ib2=sio2_in>0?cao_tot/sio2_in:0;
  const ib3=(sio2_in+al2o3_in)>0?(cao_tot+mgo_in)/(sio2_in+al2o3_in):0;
  const slag_kg=hm_per_charge>0?(sio2_in+cao_tot+mgo_in+al2o3_in)/hm_per_charge*1000:0;
  const ore_vol=total_ore_kg/1000/1.8; const coke_vol=coke_base/1000/0.5;
  const charge_vol=ore_vol+coke_vol;
  const PI=Math.PI;
  const th_area=PI*(th_dia/2)**2; const bl_area=PI*(bl_dia/2)**2;
  const flux_rate=hm_per_charge>0?(ls_kg+dl_kg)/hm_per_charge*1000:0;
  const ibrm=hm_per_charge>0?total_ore_kg/hm_per_charge:0;
  const sv=(id,v,d=2)=>{const el=document.getElementById(id);if(el)el.textContent=typeof v==='number'?v.toFixed(d):(v||'—');};
  sv('out_fr',fuel_rate);sv('out_cr',coke_rate);sv('out_pci',pci);sv('out_nc_rate',nc);
  sv('out_sr',slag_kg);sv('out_hm',hm_per_charge,3);sv('out_flux',flux_rate);
  sv('out_ibrm',ibrm,1);sv('out_ib2',ib2,3);sv('out_ib3',ib3,3);
  sv('out_al2o3',sio2_in>0?al2o3_in/sio2_in*100:0,1);
  sv('out_mgo',sio2_in>0?mgo_in/sio2_in*100:0,1);
  sv('out_throat_area',th_area,2);sv('out_belly_area',bl_area,2);
  sv('out_prod_idx',tprod/bl_area,2);sv('out_chg_day',chr*24,0);
  const svb=(id,v,d=1)=>{const el=document.getElementById(id);if(el)el.textContent=typeof v==='number'?v.toFixed(d):(v||'—');};
  svb('bv_coke_base',coke_base);svb('bv_coke1',coke1);svb('bv_coke2',coke2);
  svb('bv_nc',nc*hm_per_charge,1);svb('bv_sinter',sinter_kg,1);svb('bv_ore',ore_kg,1);
  svb('bv_pellet',pellet_kg,1);svb('bv_dri',dri_kg,1);svb('bv_ore_total',total_ore_kg,1);
  svb('bv_total',charge_vol,2);svb('bv_coke_vol',coke_vol,2);svb('bv_ore_vol',ore_vol,2);
  svb('bv_hm',hm_per_charge,3);svb('bv_slag',hm_per_charge*slag_kg/1000,3);
  svb('bv_ib2',ib2,3);svb('bv_ib3',ib3,3);
  window._burdenCalc={coke_base,coke1_kg:coke1,coke2_kg:coke2,sinter_kg,ore_kg,pellet_kg,
    dri_kg,total_ore_kg,hm_per_charge,coke_rate,pci_rate:pci,fuel_rate,charges_hr:chr,
    slag_rate_kg:slag_kg,ore_coke:oc,ts:Date.now()};
  // Cascade burden change to hourly log, dump_h0, prod_est, overview KPI
  _rebuildHourlyLog();
}

function saveBurden(){
  const BK='burden_saved';
  const ids=['in_hmsi','in_hmfe','in_oc','in_sinter','in_pellet','in_dri',
             'in_coke1','in_coke2','in_nc','in_pci','in_b2','in_ls','in_dol',
             'in_eaf','in_chr','in_wv','in_throat_dia','in_belly_dia','in_tprod','in_cbf'];
  const sv={};
  ids.forEach(id=>{const el=document.getElementById(id);if(el)sv[id]=el.value;});
  // Write to BOTH in-memory cache (instant) and localStorage (persistent)
  window._burdenSaved = sv;
  try{localStorage.setItem(BK,JSON.stringify(sv));}catch(e){}
  const btn=document.getElementById('bd_save_btn');

function loadSavedBurden(){
  try{
    // In-memory cache first (instant, no flash) — then fall back to localStorage
    let sv = window._burdenSaved || null;
    if(!sv){
      const raw = localStorage.getItem('burden_saved');
      sv = raw ? JSON.parse(raw) : null;
      if(sv) window._burdenSaved = sv; // warm the cache
    }
    if(!sv || !Object.keys(sv).length) return;
    Object.keys(sv).forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.value=sv[id];
    });
    // Re-run ore auto-calc after restoring values
    updateOre();
    calcBurden();
    const ntc=document.getElementById('bd_save_notice');
    if(ntc){ntc.style.display='block';ntc.textContent='✓ Saved values restored';}
  }catch(e){}
}

function resetBurden(){
  // Clear saved state so reset actually shows defaults
  window._burdenSaved = null;
  try{ localStorage.removeItem('burden_saved'); }catch(e){}
  const D=IOD;

    ['in_hmsi',D.hm_si],['in_hmfe',94.5],['in_cbf',D.cbf],['in_chr',D.chr],
    ['in_oc',D.ore_coke],['in_sinter',D.sinter],['in_pellet',D.pellet],
    ['in_dri',D.dri],['in_pci',D.pci],['in_nc',D.nc],['in_b2',D.b2_set],
    ['in_ls',D.limestone],['in_dol',D.dolomite],['in_eaf',D.eaf_slag||0],
    ['in_coke_base',3000],['in_coke1',D.coke1],['in_coke2',D.coke2]];
  fields.forEach(([id,v])=>{const el=document.getElementById(id);if(el&&v!==null)el.value=v;});

  calcBurden();
  // Reset clears saved values — no reload after reset

  if(ntc){ntc.style.display='none';}
}

function rnFuelOpt(){
  const fr   = DB.fuel_opt;

  const pr2  = h2.length ? h2.reduce((s,r)=>s+(r.corr_pr||0),0)/h2.length : 0;

  // KPIs
  const kpis=[

  // Period rates table — from DB.fuel_rates (Excel) with 2-hr avg for current period

     thi:(DB.thi&&DB.thi[0])?DB.thi[0].thi_value:1.0,live:true},

  const ma_cbf =computeMA(1,WIN2H)||87543;
  const ma_hbt =computeMA(3,WIN2H)||1106;
  const ma_cwi =computeMA(21,WIN2H)||(DB.aero&&DB.aero.cwi)||0.855;
  const ma_pwi =computeMA(22,WIN2H)||(DB.aero&&DB.aero.pwi)||1.075;
  const ma_tdp =computeMA(16,WIN2H)||1.252;
  const theo  =fe.theoretical_balance||0.9944;
  const actual=fe.actual_balance||0.9868;
  const cf    =theo>0?actual/theo:1;
  const theo_hm=fe.theoretical_hm||5002;
  const actual_hm=fe.actual_hm||4936;
  const pad=n=>String(n).padStart(2,'0');
  const now=new Date();
  const ts=pad(now.getHours())+':'+pad(now.getMinutes());
  const matRows=(fe.materials||[]).filter(m=>m.consumption!=null).map(m=>`<tr>
    <td style="font-weight:600">${m.material}</td><td style="text-align:center">${m.unit||'--'}</td>

    <td style="text-align:right;color:#38d9f5">${m.al2o3_pct!=null?m.al2o3_pct.toFixed(2):'--'}</td>
    <td style="text-align:right;color:#e040fb">${m.sio2_pct!=null?m.sio2_pct.toFixed(2):'--'}</td>
    <td style="text-align:right;color:var(--grn)">${m.fe_t!=null?m.fe_t.toFixed(1):'--'}</td>
  </tr>`).join('');
  const consRows=d.slice(0,8).map((r,i)=>`<tr style="${i===0?'border-left:3px solid #22c55e':''}" >
    <td style="color:${i===0?'#22c55e':'var(--teal)'}">
      ${i===0?'<b>Current 5-Day</b>':String(r.record_date||'').slice(0,10)}</td>
    <td style="text-align:right">${r.sinter_mt||'--'}</td>
    <td style="text-align:right">${r.ore_mt||'--'}</td>
    <td style="text-align:right">${r.pellets_mt||'--'}</td>
    <td style="text-align:right">${r.coke_mt||'--'}</td>
    <td style="text-align:right">${r.nut_coke_mt||'--'}</td>
    <td style="text-align:right">${r.pci_coal_mt||'--'}</td>
    <td style="text-align:right;color:var(--teal);font-weight:700">${r.hm_production_mt||'--'}</td>
  </tr>`).join('');
  document.getElementById('febal').innerHTML=`
  <div class="stitle">Fe BALANCE -- Material Flow and Production Correction
    <span style="font-size:.6rem;color:var(--mu);font-weight:400"> -- Updated: ${ts}</span></div>
  <div class="krow" style="flex-wrap:wrap;gap:8px;margin-bottom:12px">
    <div class="kpi kpi-card" style="border-top:3px solid var(--or);min-width:130px">
      <div class="kl" style="font-size:.6rem;font-weight:700">THEORETICAL Fe BALANCE</div>
      <div class="kv" style="color:var(--or);font-size:1.25rem;font-weight:900">${theo.toFixed(4)}</div>
      <div class="ku">ratio</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--grn);min-width:130px">
      <div class="kl" style="font-size:.6rem;font-weight:700">ACTUAL Fe BALANCE</div>
      <div class="kv" style="color:var(--grn);font-size:1.25rem;font-weight:900">${actual.toFixed(4)}</div>
      <div class="ku">ratio</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--mag);min-width:140px">
      <div class="kl" style="font-size:.6rem;font-weight:700">Fe-BAL CORR. FACTOR</div>
      <div class="kv" style="color:var(--mag);font-size:1.25rem;font-weight:900">${cf.toFixed(4)}</div>
      <div class="ku">Actual / Theoretical</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--teal);min-width:130px">
      <div class="kl" style="font-size:.6rem">Theoretical HM (5-Day)</div>
      <div class="kv" style="color:var(--teal)">${(theo_hm||0).toFixed(0)}</div>
      <div class="ku">MT</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid #22c55e;min-width:130px">
      <div class="kl" style="font-size:.6rem">Actual HM (5-Day)</div>
      <div class="kv" style="color:#22c55e">${(actual_hm||0).toFixed(0)}</div>
      <div class="ku">MT</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--blu);min-width:130px">
      <div class="kl" style="font-size:.6rem">CBF 2-Hr MA LIVE</div>
      <div class="kv" style="color:var(--blu)">${(ma_cbf/1000).toFixed(1)}</div>
      <div class="ku">kNm3/Hr</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--or);min-width:110px">
      <div class="kl" style="font-size:.6rem">HBT 2-Hr LIVE</div>
      <div class="kv" style="color:var(--or)">${ma_hbt.toFixed(0)}</div>
      <div class="ku">deg C</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--teal);min-width:110px">
      <div class="kl" style="font-size:.6rem">CWI 2-Hr LIVE</div>
      <div class="kv" style="color:var(--teal)">${ma_cwi.toFixed(3)}</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--mag);min-width:110px">
      <div class="kl" style="font-size:.6rem">PWI 2-Hr LIVE</div>
      <div class="kv" style="color:var(--mag)">${ma_pwi.toFixed(3)}</div></div>
    <div class="kpi kpi-card" style="border-top:3px solid var(--red);min-width:110px">
      <div class="kl" style="font-size:.6rem">Total DP 2-Hr LIVE</div>
      <div class="kv" style="color:var(--red)">${ma_tdp.toFixed(3)}</div>
      <div class="ku">bar</div></div>
  </div>
  <div class="g2">
    <div>
      <div style="font-size:.72rem;color:var(--or);font-weight:700;margin-bottom:6px">Fe Balance -- Material Summary (5-Day MA)</div>
      <div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:.67rem">
        <thead><tr><th style="text-align:left">Material</th><th>Unit</th>
          <th style="text-align:right">Consumption</th>
          <th style="text-align:right;color:var(--or)">Fe%</th>
          <th style="text-align:right;color:#38d9f5">Al2O3%</th>
          <th style="text-align:right;color:#e040fb">SiO2%</th>
          <th style="text-align:right;color:var(--grn)">Fe (MT)</th></tr></thead>
        <tbody>${matRows}</tbody>
      </table></div>
    </div>
    <div>
      <div style="font-size:.72rem;color:var(--teal);font-weight:700;margin-bottom:6px">Raw Material Consumption History (MT)</div>
      <div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:.67rem">
        <thead><tr><th>Date</th><th style="text-align:right">Sinter</th>
          <th style="text-align:right">Ore</th><th style="text-align:right">Pellets</th>
          <th style="text-align:right">Coke</th><th style="text-align:right">Nut Coke</th>
          <th style="text-align:right">PCI</th><th style="text-align:right;color:var(--teal)">HM (MT)</th></tr></thead>
        <tbody>${consRows}</tbody>
      </table></div>
    </div>
  </div>`;
}

function rnShaft(){
  const vizData = DB.shaft_viz || [];
  const simData = (DB.shaft_sim||[]).filter(s=>s.layer!=='TOTAL');
  const hl = DB.hourly_log||[];
  const bc = window._burdenCalc;
  const h2 = hl.slice(0,2);
  const cr2 = h2.length ? h2.reduce((s,r)=>s+(r.corr_cr||0),0)/h2.length : 399.26;
  const pr2 = h2.length ? h2.reduce((s,r)=>s+(r.corr_pr||0),0)/h2.length : 142.33;
  const fr2 = h2.length ? h2.reduce((s,r)=>s+(r.corr_fr||0),0)/h2.length : 541.58;
  const reqFR = (DB.fuel_rates&&DB.fuel_rates.req_fr)||576.67;
  const coke_pd = bc ? bc.coke_base/1000 : 5;
  const ore_pd  = bc ? bc.total_ore_kg/1000 : 20;
  const hm_pd   = bc ? bc.hm_per_charge : 12.315;
  const charges = bc ? (bc.charges_hr||6) : 6;

  // 6 DISTINCT BRIGHT SOLID COLOURS — no blur
  const LCFG = [
    {name:'Layer 1 – At Top',   solid:'#00e5ff', dark:'#003340', text:'#ffffff'},
    {name:'Layer 2',             solid:'#69ff47', dark:'#0a2500', text:'#000000'},
    {name:'Layer 3',             solid:'#ffea00', dark:'#2a2000', text:'#000000'},
    {name:'Layer 4',             solid:'#ff6d00', dark:'#2a1000', text:'#ffffff'},
    {name:'Layer 5',             solid:'#e040fb', dark:'#1a0025', text:'#ffffff'},
    {name:'Layer 6 – At Tuyere',solid:'#ff1744', dark:'#2a0010', text:'#ffffff'},
  ];
  const LC={};
  LCFG.forEach(l=>LC[l.name]=l.solid);
  const totalVol = simData.reduce((a,s)=>a+s.vol,0)||527.78;

  // Group viz data by layer
  const LG={};
  vizData.forEach(r=>{
    const l=r.layer||'Other';
    if(!LG[l]) LG[l]={vol:0,numC:0,numO:0,coke:0,ore:0,hm:0};
    LG[l].vol+=r.vol||0;
    if(r.type==='C'||r.type.startsWith('C ')){LG[l].numC++;LG[l].coke+=coke_pd;}
    if(r.type==='O'||r.type.startsWith('O ')){LG[l].numO++;LG[l].ore+=ore_pd;LG[l].hm+=hm_pd;}
  });

  // ─── SVG SHAFT ────────────────────────────────────────────────────
  const W=500, totalShaftH=440;
  const layerNames = LCFG.map(l=>l.name);
  const volSum = layerNames.reduce((a,n)=>a+(LG[n]?.vol||totalVol/6),0)||totalVol;

  // Build layers from top to bottom
  const HEADER_H = 42;
  let curY = HEADER_H;
  let svgContent = '';

  layerNames.forEach((name, li) => {
    const cfg   = LCFG[li];
    const ldata = LG[name] || {vol:totalVol/6, numC:4, numO:4, coke:coke_pd*4, ore:ore_pd*4};
    const simR  = simData.find(s=>s.layer===name) || {corr_coke:cr2, corr_fuel:fr2};
    const frac  = ldata.vol / Math.max(volSum,1);
    const lh    = Math.max(80, Math.round((totalShaftH-20) * frac));
    // Taper: BF widens from top to belly then narrows to tuyere
    const belly = 0.5; // belly is at layer 3/4
    const dist  = Math.abs(li - belly*5) / 5;
    const minW  = 160, maxW = 340;
    const lw    = Math.round(maxW - (maxW-minW)*dist*0.85);
    const lx    = (W - lw) / 2;
    const isSurp = fr2 >= reqFR;
    const col   = cfg.solid;
    const dark  = cfg.dark;
    const txt   = cfg.text;

    // Coke/ore mini stripe bars at top of each layer
    const stripeH = 6;
    const stripes = Array.from({length:8},(_,si)=>{
      const isC = si%2===0;
      const sw = Math.round(lw/8);
      return `<rect x="${lx+si*sw}" y="${curY}" width="${sw-1}" height="${stripeH}"
        fill="${isC?'#ff6d00':'#26c6da'}" opacity="0.9"/>`;
    }).join('');

    // Main layer body - SOLID fill, no filter/blur
    svgContent += `
    <!-- ── Layer ${li+1}: ${name} ── -->
    <rect x="${lx}" y="${curY+stripeH}" width="${lw}" height="${lh-stripeH}"
      fill="${dark}" stroke="${col}" stroke-width="3" rx="4"/>
    ${stripes}
    <!-- Bright left/right accent bars -->
    <rect x="${lx}" y="${curY}" width="6" height="${lh}" fill="${col}" rx="2"/>
    <rect x="${lx+lw-6}" y="${curY}" width="6" height="${lh}" fill="${col}" rx="2"/>
    <!-- Layer name - LARGE BOLD -->
    <text x="${W/2}" y="${curY+stripeH+22}" text-anchor="middle"
      font-family="'Courier New',monospace" font-size="18" font-weight="900"
      fill="${col}" stroke="#000" stroke-width="0.5" paint-order="stroke" letter-spacing="0.5">
      ${name.toUpperCase()}
    </text>
    <!-- Vol | CR line -->
    <text x="${W/2}" y="${curY+stripeH+38}" text-anchor="middle"
      font-family="'Courier New',monospace" font-size="14" font-weight="700"
      fill="#ffffff" stroke="#000" stroke-width="0.3" paint-order="stroke">
      Vol: ${ldata.vol.toFixed(1)}m³  |  CR: ${(simR.corr_coke||cr2).toFixed(0)} kg/t
    </text>
    <!-- FR | Status line - bright white text for fuel rate -->
    <text x="${W/2}" y="${curY+stripeH+52}" text-anchor="middle"
      font-family="'Courier New',monospace" font-size="12" font-weight="900"
      fill="#ffffff" style="text-shadow:0 0 8px #fff">
      FR: <tspan fill="#ffffff" font-size="13">${(simR.corr_fuel||fr2).toFixed(0)}</tspan> kg/t
      <tspan fill="${isSurp?'#69ff47':'#ff5252'}" font-size="11">
        — ${isSurp?'SURPLUS ✓':'DEFICIT ⚠'}</tspan>
    </text>
    <!-- C/O count badges -->
    <rect x="${lx+10}" y="${curY+stripeH+10}" width="28" height="16" fill="${col}" rx="3"/>
    <text x="${lx+24}" y="${curY+stripeH+22}" text-anchor="middle"
      font-family="monospace" font-size="11" font-weight="900" fill="#000">
      C:${ldata.numC}
    </text>
    <rect x="${lx+lw-38}" y="${curY+stripeH+10}" width="28" height="16" fill="${col}" rx="3"/>
    <text x="${lx+lw-24}" y="${curY+stripeH+22}" text-anchor="middle"
      font-family="monospace" font-size="9" font-weight="900" fill="#000">
      O:${ldata.numO}
    </text>`;

    curY += lh + 2;
  });

  // Raceway zone
  const rW=200, rH=52, rX=(W-rW)/2;
  svgContent += `
  <!-- Raceway -->
  <defs>
    <radialGradient id="rg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
  </defs>
  <rect x="${rX}" y="${curY}" width="${rW}" height="${rH}" fill="url(#rg)" rx="5"
    stroke="#ff1744" stroke-width="2"/>
  <text x="${W/2}" y="${curY+20}" text-anchor="middle"
    font-family="'Courier New',monospace" font-size="13" font-weight="900" fill="#fff">
    🔥 RACEWAY / TUYERE ZONE
  </text>
  <text x="${W/2}" y="${curY+38}" text-anchor="middle"
    font-family="monospace" font-size="11" font-weight="700" fill="#ffd740">
    HM: ${(hm_pd*charges).toFixed(1)} t/hr  |  ${charges} charges/hr
  </text>
  <!-- Tuyere ports -->
  <ellipse cx="${rX-15}" cy="${curY+rH/2}" rx="18" ry="10" fill="#ff6d00" stroke="#ffd740" stroke-width="1.5"/>
  <ellipse cx="${rX+rW+15}" cy="${curY+rH/2}" rx="18" ry="10" fill="#ff6d00" stroke="#ffd740" stroke-width="1.5"/>
  <!-- Hot metal -->
  <rect x="${rX+15}" y="${curY+rH+2}" width="${rW-30}" height="18" fill="#ff6d00" rx="2" opacity="0.8"/>
  <text x="${W/2}" y="${curY+rH+14}" text-anchor="middle"
    font-family="monospace" font-size="9" font-weight="700" fill="#fff">HOT METAL</text>`;

  // Legend
  const legY = curY + rH + 30;
  svgContent += `
  <rect x="12" y="${legY}" width="12" height="10" fill="#ff6d00" rx="1"/>
  <text x="28" y="${legY+9}" font-family="monospace" font-size="11" fill="#ff6d00">Coke</text>
  <rect x="65" y="${legY}" width="12" height="10" fill="#26c6da" rx="1"/>
  <text x="81" y="${legY+9}" font-family="monospace" font-size="11" fill="#26c6da">Ore</text>
  <!-- Stock line -->
  <line x1="${(W-220)/2}" y1="${HEADER_H}" x2="${(W+220)/2}" y2="${HEADER_H}"
    stroke="#69ff47" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="${(W-220)/2-6}" y="${HEADER_H+4}" text-anchor="end"
    font-family="monospace" font-size="11" font-weight="700" fill="#69ff47">▼ STOCK LINE</text>`;

  const shaftSVG = `<svg viewBox="0 0 ${W} ${curY+rH+50}"
    xmlns="http://www.w3.org/2000/svg"
    style="width:100%;max-width:${W}px;height:auto;display:block;
    background:#060f1a;border-radius:10px;border:2px solid #1a3a5c">
    <!-- Dark background -->
    <rect width="${W}" height="${curY+rH+50}" fill="#060f1a" rx="10"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="${W}" height="${HEADER_H-4}" fill="#0a1a2e" rx="10"/>
    <text x="${W/2}" y="26" text-anchor="middle"
      font-family="'Courier New',monospace" font-size="15" font-weight="900"
      fill="#00e5ff" letter-spacing="2">
      BF SHAFT CROSS-SECTION — 6-LAYER BURDEN
    </text>
    ${svgContent}
  </svg>`;

  // ─── Layer simulation table ─────────────────────────────────────────
  const simRows = LCFG.map(cfg=>{
    const s   = simData.find(d=>d.layer===cfg.name)||{vol:totalVol/6,corr_coke:cr2,corr_pci:pr2,corr_fuel:fr2};
    const ld  = LG[cfg.name]||{vol:totalVol/6,numC:4,numO:4,coke:coke_pd*4,ore:ore_pd*4};
    const isSurp=fr2>=reqFR;
    return `<tr>
      <td style="padding:5px 8px">
        <span style="display:inline-block;width:12px;height:12px;background:${cfg.solid};
          border-radius:2px;margin-right:6px;vertical-align:middle"></span>
        <b style="color:${cfg.solid};font-size:.72rem">${cfg.name}</b>
      </td>
      <td style="text-align:right;font-weight:900;font-size:.8rem;color:${cfg.solid}">${s.vol.toFixed(2)}</td>
      <td style="text-align:center;font-weight:700;color:#ff6d00">${ld.numC}</td>
      <td style="text-align:center;font-weight:700;color:#26c6da">${ld.numO}</td>
      <td style="text-align:right;font-weight:900;color:#ff6d00">${ld.coke.toFixed(2)}</td>
      <td style="text-align:right;font-weight:900;color:#26c6da">${ld.ore.toFixed(2)}</td>
      <td style="text-align:right;color:#ffab40">${(s.corr_coke||cr2).toFixed(2)}</td>
      <td style="text-align:right;color:#80deea">${(s.corr_pci||pr2).toFixed(2)}</td>
      <td style="text-align:right;font-weight:900;font-size:.78rem;color:#ffd740">${(s.corr_fuel||fr2).toFixed(2)}</td>
      <td style="font-weight:900;font-size:.72rem;color:${isSurp?'#69ff47':'#ff5252'}">
        ${isSurp?'🟢 Surplus':'🔴 Deficit'}</td>
    </tr>`;
  }).join('');

  // ─── Volume distribution bars ───────────────────────────────────────
  const volBars = LCFG.map(cfg=>{
    const s  = simData.find(d=>d.layer===cfg.name)||{vol:totalVol/6};
    const pct= totalVol>0?(s.vol/totalVol*100).toFixed(1):'0';
    return `<div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="color:${cfg.solid};font-weight:700;font-size:.65rem">${cfg.name}</span>
        <span style="color:#8ab4d0;font-size:.6rem">${s.vol.toFixed(2)} m³ (${pct}%)</span>
      </div>
      <div style="height:9px;background:#0a1a2e;border-radius:4px;border:1px solid #1a3a5c">
        <div style="width:${pct}%;height:100%;background:${cfg.solid};border-radius:4px"></div>
      </div>
    </div>`;
  }).join('');

  // ─── BF Shaft Charge Visualisation (55-dump dynamic table) ─────────
  function vary5(base,idx){ const s=Math.sin(idx*2.399)*Math.cos(idx*0.7+1.3); return Math.max(0,base*(1+s*0.05)); }
  const vizRows = vizData.map((r,i)=>{
    const isC = r.type==='C'||r.type.startsWith('C ');
    const lCol = LC[r.layer]||'#8ab4d0';
    const dc  = isC ? (bc?vary5(coke_pd,i).toFixed(2):(r.coke_t||0).toFixed(2)) : '—';
    const dor = !isC ? (bc?vary5(ore_pd,i).toFixed(2):'20.00') : '—';
    const dhm = !isC ? (bc?vary5(hm_pd,i).toFixed(3):(r.hm_prod||0).toFixed(3)) : '—';
    return `<tr style="background:${isC?'rgba(255,109,0,.07)':'rgba(38,198,218,.07)'}">
      <td style="text-align:center;color:#3a5a70;font-size:.6rem">${r.seq}</td>
      <td style="text-align:center;color:#3a5a70;font-size:.6rem">${r.hour}</td>
      <td style="text-align:center;font-weight:700">${r.dump}</td>
      <td style="text-align:center;color:${isC?'#ff6d00':'#26c6da'};font-weight:900;font-size:.78rem">${r.type}</td>
      <td style="font-family:monospace;font-size:.6rem;color:#7a90a8">${r.time}</td>
      <td style="text-align:right;color:#5090c0">${(r.vol||0).toFixed(2)}</td>
      <td style="text-align:right;color:#3a5a70">${(r.run_vol||0).toFixed(2)}</td>
      <td style="color:${lCol};font-size:.6rem;font-weight:700">${r.layer}</td>
      <td style="text-align:right;color:#ff6d00;font-weight:700">${dc}</td>
      <td style="text-align:right;color:#26c6da;font-weight:700">${dor}</td>
      <td style="text-align:right;color:#b39ddb;font-weight:700">${dhm}</td>
    </tr>`;
  }).join('');

  // KPI cards
  const kpis=[
    {l:'Coke Rate (2-Hr)',v:cr2,u:'kg/t',c:'#ffab40'},
    {l:'PCI Rate (2-Hr)',v:pr2,u:'kg/t',c:'#80deea'},
    {l:'Fuel Rate (2-Hr)',v:fr2,u:'kg/t',c:'#ffd740'},
    {l:'Req. Fuel Rate',v:reqFR,u:'kg/t',c:'#ff5252'},
    {l:'vs Req. FR',v:fr2-reqFR,u:'kg/t',c:fr2>=reqFR?'#69ff47':'#ff5252'},

    <div>
      <div style="font-size:.72rem;color:#00e5ff;font-weight:700;margin-bottom:5px">
        🔥 BF SHAFT CROSS-SECTION (Solid Colour, No Blur)</div>
      ${shaftSVG}
      <div style="margin-top:6px;font-size:.62rem;color:#3a5a70;padding:5px 8px;
        background:#060f1a;border-radius:4px;border:1px solid #0d2137">

function initShaftCanvas(){
  const canvas=document.getElementById('shaft-canvas');
  if(!canvas)return;
  const p=canvas.parentElement;
  canvas.width=p.clientWidth; canvas.height=p.clientHeight-40-36;
  runShaftAnim();
}

function runShaftAnim(){
  const canvas=document.getElementById('shaft-canvas');
  if(!canvas){shaftAnimId=null;return;}
  const ctx=canvas.getContext('2d');
  shaftTick++;
  nextChargeTimer--;
  if(nextChargeTimer<=0) triggerShaftCharge();
  drawShaft(ctx,canvas.width,canvas.height);
  shaftAnimId=requestAnimationFrame(runShaftAnim);
}

function triggerShaftCharge(){
  const type=CHARGE_PATTERN[chargePatIdx%CHARGE_PATTERN.length];
  chargePatIdx++;
  chargeDropSeq++;
  const vol=type==='C'?6.0+Math.random()*0.3:7.33+Math.random()*0.2;
  chargeFalling={type,y:-20,speed:3.5,vol,alpha:1.0};
  shaftLog.unshift({seq:chargeDropSeq,type,time:new Date().toTimeString().slice(0,8),vol});
  if(shaftLog.length>10)shaftLog.pop();
  const db=document.getElementById('shaft-dump-badge');
  if(db)db.textContent=`Dump#${chargeDropSeq} · ${type==='C'?'🟦 Coke':'🟧 Ore'}`;
  const nb=document.getElementById('shaft-next-badge');
  const nxt=CHARGE_PATTERN[chargePatIdx%CHARGE_PATTERN.length];
  if(nb)nb.textContent=`Next: ${nxt}`;
  nextChargeTimer=type==='C'?75:95;
  const logEl=document.getElementById('shaft-log');
  if(logEl)logEl.innerHTML=shaftLog.map(l=>`<div style="display:flex;gap:6px;padding:2px 0;border-bottom:1px solid rgba(30,45,71,.4)"><span style="width:8px;height:8px;border-radius:2px;background:${l.type==='C'?'#00d4b8':'#e8943a'};display:inline-block;margin-top:2px;flex-shrink:0"></span><span style="color:var(--mu)">${l.time}</span><span style="color:${l.type==='C'?'#00d4b8':'#e8943a'}">#${l.seq} ${l.type}</span><span style="color:var(--tx)">${l.vol.toFixed(1)}m³</span></div>`).join('');
}

function drawShaft(ctx,W,H){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#060a12');bg.addColorStop(1,'#0c1220');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  const cx=W*0.5;
  const topY=H*0.03,stockY=H*0.09,shaftBotY=H*0.60,boshBotY=H*0.74,hearthBotY=H*0.91;
  const topHW=W*0.17,stockHW=W*0.22,maxHW=W*0.255,boshHW=W*0.27,hearthHW=W*0.27;

  function wallX(y){
    if(y<=topY)return topHW;
    if(y<=stockY)return topHW+(stockHW-topHW)*(y-topY)/(stockY-topY);
    if(y<=shaftBotY)return stockHW+(maxHW-stockHW)*(y-stockY)/(shaftBotY-stockY);
    if(y<=boshBotY)return maxHW+(boshHW-maxHW)*(y-shaftBotY)/(boshBotY-shaftBotY);
    return hearthHW;
  }

  // ─ 6 burden layers (proportional volume heights)
  const shaftPx=shaftBotY-stockY;
  let cumFrac=0;
  SHAFT_LAYERS.forEach((l,li)=>{
    const y1=stockY+cumFrac*shaftPx, y2=stockY+(cumFrac+l.hFrac)*shaftPx;
    cumFrac+=l.hFrac;
    const isHov=(shaftHoverLayer===l.no);
    const nS=5; const sH=(y2-y1)/nS;
    for(let s=0;s<nS;s++){
      const sy1=y1+s*sH,sy2=sy1+sH;
      const isOre=(s+li)%2===0;
      const hw1=wallX(sy1)*0.97,hw2=wallX(sy2)*0.97;
      ctx.beginPath();
      ctx.moveTo(cx-hw1,sy1);ctx.lineTo(cx+hw1,sy1);
      ctx.lineTo(cx+hw2,sy2);ctx.lineTo(cx-hw2,sy2);ctx.closePath();
      if(isOre){
        const og=ctx.createLinearGradient(0,sy1,0,sy2);
        if(l.status==='surplus'){
          og.addColorStop(0,'rgba(60,150,80,.82)');og.addColorStop(1,'rgba(40,110,60,.76)');
        } else {
          og.addColorStop(0,'rgba(198,110,45,.82)');og.addColorStop(1,'rgba(155,72,18,.76)');
        }
        ctx.fillStyle=og;
      } else {
        const cg=ctx.createLinearGradient(0,sy1,0,sy2);
        cg.addColorStop(0,'rgba(55,80,108,.75)');cg.addColorStop(1,'rgba(35,55,78,.70)');
        ctx.fillStyle=cg;
      }
      ctx.fill();
    }
    // Layer boundary
    const hw=wallX(y1)*0.97;
    ctx.beginPath();ctx.moveTo(cx-hw,y1);ctx.lineTo(cx+hw,y1);
    ctx.strokeStyle=isHov?'rgba(0,212,184,.9)':'rgba(0,212,184,.2)';
    ctx.lineWidth=isHov?2:1;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    // Layer label — LARGE BOLD WHITE TEXT with strong shadow
    const ym=(y1+y2)/2;
    const lwx=wallX(ym)*0.97;
    const layerH=y2-y1;
    // Font size: proportional to layer height, NOT capped by H
    const fs1=Math.max(15, layerH*0.30);  // e.g. 83px layer → 25px font
    const fs2=Math.max(12, layerH*0.22);
    // Strong black outline shadow
    ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=12; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
    // LINE 1: L# + Fuel Rate — biggest, brightest
    ctx.font=`900 ${fs1}px 'Share Tech Mono',monospace`;
    ctx.textAlign='center';
    ctx.fillStyle=isHov?'#00ffd4':(l.status==='surplus'?'#00ff80':'#ffcc00');
    ctx.fillText(`L${l.no}  ${l.fuel.toFixed(0)} kg/t`,cx,ym-fs1*0.15);
    // Draw text again slightly offset for pseudo-stroke effect
    ctx.fillStyle='rgba(0,0,0,.6)';
    ctx.fillText(`L${l.no}  ${l.fuel.toFixed(0)} kg/t`,cx+1,ym-fs1*0.15+1);
    ctx.fillStyle=isHov?'#00ffd4':(l.status==='surplus'?'#00ff80':'#ffcc00');
    ctx.fillText(`L${l.no}  ${l.fuel.toFixed(0)} kg/t`,cx,ym-fs1*0.15);
    // LINE 2: Vol + Coke Rate — bright white
    ctx.shadowBlur=10;
    ctx.font=`bold ${fs2}px 'Share Tech Mono',monospace`;
    ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.fillText(`${l.vol.toFixed(1)}m³    CR:${l.coke.toFixed(0)} kg/t`,cx,ym+fs1*0.82);
    ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
    // Status dot
    ctx.beginPath();ctx.arc(cx+lwx-10,ym,H*0.007,0,Math.PI*2);
    ctx.fillStyle=l.status==='surplus'?'rgba(0,220,110,.85)':'rgba(255,80,80,.85)';ctx.fill();
  });

  // ─ CZ marker at 7m above tuyere = hFrac 72% from top of shaft
  const czFrac=(25-7)/25; // 18/25=0.72 from stockline
  const czY=stockY+czFrac*shaftPx;
  const czHW=wallX(czY)*0.88;
  const czPulse=0.5+Math.sin(shaftTick*0.06)*0.25;
  ctx.beginPath();ctx.ellipse(cx,czY,czHW,H*0.022,0,0,Math.PI*2);
  const czG=ctx.createRadialGradient(cx,czY,0,cx,czY,czHW);
  czG.addColorStop(0,`rgba(0,200,100,${czPulse*0.3})`);
  czG.addColorStop(1,'rgba(0,200,100,0)');
  ctx.fillStyle=czG;ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,czY,czHW,H*0.022,0,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,200,110,${0.5+czPulse*0.3})`;
  ctx.lineWidth=2;ctx.setLineDash([8,5]);ctx.stroke();ctx.setLineDash([]);
  ctx.font=`${H*0.02}px 'Rajdhani',sans-serif`;
  ctx.fillStyle=`rgba(0,200,110,${0.7+czPulse*0.2})`;
  ctx.textAlign='left';
  ctx.fillText(`⊕ Cohesive Zone ~1200°C  h=7m`,cx+czHW+7,czY+4);

  // ─ Tuyere/Raceway (pulsing flame)
  const pulse=0.65+Math.sin(shaftTick*0.14)*0.28;
  const ry=boshBotY;
  const rhw=wallX(ry);
  const rg=ctx.createRadialGradient(cx,ry,0,cx,ry,rhw*0.75);
  rg.addColorStop(0,`rgba(255,130,0,${pulse*0.38})`);
  rg.addColorStop(0.5,`rgba(255,60,0,${pulse*0.2})`);
  rg.addColorStop(1,'rgba(255,50,0,0)');
  ctx.beginPath();ctx.ellipse(cx,ry,rhw*0.8,H*0.038,0,0,Math.PI*2);ctx.fillStyle=rg;ctx.fill();
  [-1,1].forEach(side=>{
    const tx=cx+side*(rhw+6),ty=ry;
    ctx.beginPath();ctx.moveTo(tx+side*W*0.045,ty);ctx.lineTo(tx,ty);
    ctx.strokeStyle=`rgba(255,${90+pulse*80},0,.75)`;ctx.lineWidth=5.5;ctx.stroke();
    ctx.beginPath();ctx.arc(tx+side*W*0.045,ty,W*0.024,0,Math.PI*2);
    const fg=ctx.createRadialGradient(tx+side*W*0.045,ty,0,tx+side*W*0.045,ty,W*0.024);
    fg.addColorStop(0,`rgba(255,255,80,${pulse})`);
    fg.addColorStop(0.45,`rgba(255,150,0,${pulse*.85})`);
    fg.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=fg;ctx.fill();
  });
  ctx.font=`${H*0.018}px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(255,130,0,.55)';ctx.textAlign='left';
  ctx.fillText('Tuyere/Raceway',cx+rhw+14,ry+4);

  // ─ Hot metal & slag
  const htop=boshBotY+H*0.012,hbot=hearthBotY,slagH=H*0.025;
  const hmg=ctx.createLinearGradient(0,htop+slagH,0,hbot);
  hmg.addColorStop(0,`rgba(255,145,0,${0.72+Math.sin(shaftTick*0.04)*0.12})`);
  hmg.addColorStop(1,'rgba(205,65,0,.88)');
  ctx.beginPath();ctx.moveTo(cx-hearthHW,htop+slagH);ctx.lineTo(cx+hearthHW,htop+slagH);
  ctx.lineTo(cx+hearthHW,hbot);ctx.lineTo(cx-hearthHW,hbot);ctx.closePath();
  ctx.fillStyle=hmg;ctx.fill();
  ctx.beginPath();ctx.moveTo(cx-hearthHW,htop);ctx.lineTo(cx+hearthHW,htop);
  ctx.lineTo(cx+hearthHW,htop+slagH);ctx.lineTo(cx-hearthHW,htop+slagH);ctx.closePath();
  const sg=ctx.createLinearGradient(0,htop,0,htop+slagH);
  sg.addColorStop(0,'rgba(145,115,70,.82)');sg.addColorStop(1,'rgba(105,78,42,.75)');
  ctx.fillStyle=sg;ctx.fill();
  // Labels
  ctx.font=`${H*0.018}px 'Share Tech Mono',monospace`;ctx.textAlign='center';
  ctx.fillStyle='rgba(255,180,80,.6)';ctx.fillText('Hot Metal',cx,(htop+hbot)/2+4);
  ctx.fillStyle='rgba(160,130,80,.55)';ctx.fillText('Slag',cx,htop+slagH/2+3);

  // ─ Taphole
  const thX=cx+hearthHW,thY=htop+slagH+(hbot-htop-slagH)*0.4;
  ctx.beginPath();ctx.moveTo(thX,thY);
  ctx.quadraticCurveTo(thX+W*0.065,thY+H*0.045,thX+W*0.04,thY+H*0.085);
  ctx.strokeStyle=`rgba(255,145,0,${0.55+Math.sin(shaftTick*0.08)*0.2})`;
  ctx.lineWidth=5.5;ctx.lineCap='round';ctx.stroke();
  ctx.font=`${H*0.017}px 'Share Tech Mono',monospace`;ctx.fillStyle='rgba(255,140,0,.55)';
  ctx.textAlign='left';ctx.fillText('Taphole',thX+W*0.042,thY+H*0.065);

  // ─ Gas arrows (converging upward, wall-dominant)
  const gasArr=[
    {x:cx,    y1:ry-H*.04, y2:stockY+H*.06, dx:0,    op:0.9},
    {x:cx-W*.07,y1:ry-H*.03,y2:stockY+H*.10,dx:-W*.04,op:0.75},
    {x:cx+W*.07,y1:ry-H*.03,y2:stockY+H*.10,dx:W*.04, op:0.75},
    {x:cx-W*.15,y1:shaftBotY*0.92,y2:stockY+H*.12,dx:-W*.05,op:0.55},
    {x:cx+W*.15,y1:shaftBotY*0.92,y2:stockY+H*.12,dx:W*.05, op:0.55},
  ];
  gasArr.forEach((a,i)=>{
    const ph=(shaftTick*0.035+i*1.1)%(Math.PI*2);
    const op=a.op*(0.38+Math.sin(ph)*0.2);
    const x2=a.x+a.dx;
    ctx.beginPath();ctx.moveTo(a.x,a.y1);ctx.quadraticCurveTo(a.x+a.dx*0.35,(a.y1+a.y2)/2,x2,a.y2);
    ctx.strokeStyle=`rgba(200,55,35,${op})`;ctx.lineWidth=2;ctx.stroke();
    const ang=Math.atan2(a.y2-a.y1,x2-a.x)-Math.PI/2;
    ctx.save();ctx.translate(x2,a.y2);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-5,10);ctx.lineTo(5,10);
    ctx.closePath();ctx.fillStyle=`rgba(200,55,35,${op})`;ctx.fill();ctx.restore();
  });

  // ─ Falling charge
  if(chargeFalling){
    chargeFalling.y+=chargeFalling.speed;
    const fy=topY+chargeFalling.y;
    const fw=wallX(fy)*0.65;
    const isC=chargeFalling.type==='C';
    ctx.beginPath();ctx.ellipse(cx,fy,fw,H*0.014,0,0,Math.PI*2);
    ctx.fillStyle=isC?`rgba(50,140,170,${chargeFalling.alpha})`:`rgba(215,125,55,${chargeFalling.alpha})`;
    ctx.fill();
    ctx.font=`bold ${H*0.019}px 'Share Tech Mono',monospace`;
    ctx.fillStyle=isC?`rgba(0,212,184,${chargeFalling.alpha})`:`rgba(255,155,65,${chargeFalling.alpha})`;
    ctx.textAlign='left';
    ctx.fillText(`${isC?'⬛ COKE':'🟧 ORE'} ${chargeFalling.vol.toFixed(1)}m³`,cx+fw+7,fy+4);
    if(fy>stockY+H*0.07){chargeFalling.alpha-=0.05;}
    if(chargeFalling.alpha<=0)chargeFalling=null;
  }

  // ─ Shell outline
  ctx.lineWidth=2.8;ctx.strokeStyle='rgba(38,68,95,.9)';ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(cx-topHW,topY);
  ctx.bezierCurveTo(cx-stockHW*0.8,stockY*0.5,cx-stockHW,stockY*0.8,cx-stockHW,stockY);
  ctx.lineTo(cx-maxHW,shaftBotY);
  ctx.bezierCurveTo(cx-boshHW*0.95,boshBotY*0.95,cx-boshHW,boshBotY,cx-hearthHW,boshBotY+H*0.01);
  ctx.lineTo(cx-hearthHW,hearthBotY);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+topHW,topY);
  ctx.bezierCurveTo(cx+stockHW*0.8,stockY*0.5,cx+stockHW,stockY*0.8,cx+stockHW,stockY);
  ctx.lineTo(cx+maxHW,shaftBotY);
  ctx.bezierCurveTo(cx+boshHW*0.95,boshBotY*0.95,cx+boshHW,boshBotY,cx+hearthHW,boshBotY+H*0.01);
  ctx.lineTo(cx+hearthHW,hearthBotY);ctx.stroke();
  // Top dome
  ctx.beginPath();ctx.moveTo(cx-topHW,topY);ctx.quadraticCurveTo(cx,topY-H*0.045,cx+topHW,topY);ctx.stroke();
  // Bottom
  ctx.beginPath();ctx.moveTo(cx-hearthHW,hearthBotY);ctx.lineTo(cx+hearthHW,hearthBotY);
  ctx.strokeStyle='rgba(55,85,115,.65)';ctx.lineWidth=2;ctx.stroke();

  // ─ Stockline
  ctx.beginPath();ctx.moveTo(cx-stockHW-8,stockY);ctx.lineTo(cx+stockHW+8,stockY);
  ctx.strokeStyle='rgba(0,212,184,.32)';ctx.lineWidth=1.2;ctx.setLineDash([7,5]);ctx.stroke();ctx.setLineDash([]);
  ctx.font=`${H*0.018}px 'Share Tech Mono',monospace`;ctx.fillStyle='rgba(0,212,184,.55)';
  ctx.textAlign='right';ctx.fillText('Stock Line',cx-stockHW-12,stockY+4);

  // ─ Zone labels
  [['Shaft',stockY+H*0.04],['Bosh',shaftBotY+H*0.03],['Hearth',(boshBotY+hearthBotY)/2]].forEach(([t,y])=>{
    ctx.font=`${H*0.017}px 'Rajdhani',sans-serif`;ctx.fillStyle='rgba(50,80,110,.65)';
    ctx.textAlign='left';ctx.fillText(t,cx+wallX(y)+12,y+3);
  });
}

let aeroAnimId=null;
let aeroTick=0;
let shaftAnimId=null;
let shaftTick=0;
let nextChargeTimer=0;
let aeroTick2=0;
// Gas zones from BF Aerodynamics sheet

function rnTHI(){
  const rawThi = DB.thi_history || DB.thi || [];
  const data = rawThi.map(r=>({
    seq: r.seq||r.seq_no||0,
    datetime: r.datetime||r.record_datetime||'',
    thi: typeof r.thi==='number' ? r.thi : (r.thi_value||0),
    status: r.status||''
  }));
  const latest = data[0] || {};
  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  // THI status colour
  function thiColor(v){
    if(v >= 2.0) return '#ff5252';        // Very High / Danger
    if(v >= 1.4) return '#f97316';        // High
    if(v >= 0.8) return '#22c55e';        // Normal
    if(v >= 0.5) return '#38d9f5';        // Low
    return '#818cf8';                      // Very Low
  }
  function thiStatus(v){
    if(v >= 2.0) return '🔴 Very High / Danger';
    if(v >= 1.4) return '🟠 High';
    if(v >= 0.8) return '🟢 Normal';
    if(v >= 0.5) return '🔵 Low';
    return '🟣 Very Low';
  }
  // Build gauge SVG
  const gaugeVal = latest.thi || 1.4386;
  const gaugeMax = 2.5;
  const gaugeAngle = Math.min(180, (gaugeVal/gaugeMax)*180);
  const rad = (gaugeAngle - 90) * Math.PI/180;
  const gx = 120 + 90*Math.sin(rad), gy = 120 - 90*Math.cos(rad);
  const gColor = thiColor(gaugeVal);
  const gaugeSVG = `<svg viewBox="0 0 240 140" style="width:220px;height:130px">
    <path d="M30,120 A90,90 0 0,1 210,120" fill="none" stroke="#1e2d42" stroke-width="22" stroke-linecap="round"/>
    <path d="M30,120 A90,90 0 0,1 ${gx},${gy}" fill="none" stroke="${gColor}" stroke-width="22" stroke-linecap="round" opacity="0.85"/>
    <circle cx="120" cy="120" r="8" fill="${gColor}"/>
    <text x="120" y="100" text-anchor="middle" fill="${gColor}" font-size="22" font-weight="900">${gaugeVal.toFixed(4)}</text>
    <text x="120" y="118" text-anchor="middle" fill="#8a9ab0" font-size="9">THI Value</text>
    <text x="32" y="138" fill="#4a6070" font-size="9">0</text>
    <text x="108" y="32" fill="#4a6070" font-size="9">1.25</text>
    <text x="196" y="138" fill="#4a6070" font-size="9">2.5</text>
    <text x="120" y="138" text-anchor="middle" fill="${gColor}" font-size="10" font-weight="700">${thiStatus(gaugeVal)}</text>
  </svg>`;

  // Trend chart data
  const trendData = data.map(r=>({x:r.seq, y:r.thi})).reverse();
  const minTHI = Math.min(...data.map(r=>r.thi), 0.5);
  const maxTHI = Math.max(...data.map(r=>r.thi), 2.2);

  // Threshold lines
  const thresholds = [
    {v:2.0, label:'Very High', col:'#ff5252'},
    {v:1.4, label:'High', col:'#f97316'},
    {v:0.8, label:'Normal', col:'#22c55e'},
    {v:0.5, label:'Low', col:'#38d9f5'},
  ];

  const tableRows = data.map((r,i)=>{
    const col = thiColor(r.thi);
    const bg  = i===0 ? '#031408' : '';
    const bar = Math.min(100, (r.thi/2.5*100)).toFixed(0);
    return `<tr style="border-left:${i===0?'3px solid #22c55e':'none'};background:${bg}">
      <td style="text-align:center;color:var(--mu)">${r.seq}</td>
      <td style="font-size:.68rem;color:${i===0?'#22c55e':'var(--tx)'}">
        ${r.datetime}${i===0?' <span style="color:#22c55e;font-size:.6rem">◀ LATEST</span>':''}
      </td>
      <td style="text-align:center">
        <span style="color:${col};font-weight:900;font-size:1.05rem">${r.thi.toFixed(4)}</span>
        <div style="height:5px;width:${bar}%;background:${col};border-radius:2px;margin-top:2px;max-width:100px"></div>
      </td>
      <td style="color:${col};font-weight:700;font-size:.72rem">${r.status||thiStatus(r.thi)}</td>
    </tr>`;
  }).join('');

  document.getElementById('ws_thi_sheet').innerHTML = `
  <div class="stitle">🌡 THERMAL HEALTH INDEX — BF Heat Status
    <span style="font-size:.65rem;color:var(--mu);font-weight:400"> &nbsp;·&nbsp;
      Auto-updates every 2hrs per cast pair &nbsp;·&nbsp; ${pad(now.getHours())}:${pad(now.getMinutes())}</span></div>

  <!-- TOP: Gauge + Latest KPIs -->
  <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px">
    <div style="background:var(--bg2);border:2px solid ${gColor};border-radius:14px;padding:16px 20px;text-align:center">
      <div style="font-size:.72rem;color:var(--mu);margin-bottom:8px">🌡 CURRENT THI</div>
      ${gaugeSVG}
      <div style="font-size:.68rem;color:${gColor};font-weight:700;margin-top:4px">${latest.datetime||''}</div>
    </div>
    <div style="flex:1;min-width:280px">
      <!-- Threshold guide -->
      <div style="font-size:.72rem;color:var(--teal);font-weight:700;margin-bottom:8px">📊 THI Threshold Guide</div>
      ${[
        ['≥ 2.0','Very High / Danger','Tuyere zone critically hot — immediate action','#ff5252'],
        ['1.4–2.0','High','Blast furnace thermal state elevated','#f97316'],
        ['0.8–1.4','Normal','Operating in normal thermal range','#22c55e'],
        ['0.5–0.8','Low','BF cooling down — check fuel rates','#38d9f5'],
        ['< 0.5','Very Low','Critical — investigate blast & burden','#818cf8'],
      ].map(([r,s,d,c])=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;
          margin-bottom:4px;background:${c}14;border-left:4px solid ${c};border-radius:0 6px 6px 0">
          <span style="color:${c};font-weight:900;min-width:65px;font-size:.78rem">${r}</span>
          <div>
            <div style="color:${c};font-weight:700;font-size:.73rem">${s}</div>
            <div style="color:var(--mu);font-size:.62rem">${d}</div>
          </div>
        </div>`).join('')}
    </div>
    <!-- KPI cards -->
    <div style="display:flex;flex-direction:column;gap:8px;min-width:200px">
      ${data.slice(0,4).map((r,i)=>{
        const col=thiColor(r.thi);
        return `<div class="kpi kpi-card" style="border-top:3px solid ${col};min-width:180px">
          <div class="kl" style="font-size:.6rem">${i===0?'🟢 LATEST (H-0)':'Cast H-'+i+' ('+r.datetime.slice(0,10)+')'}</div>
          <div class="kv" style="color:${col};font-size:1.2rem;font-weight:900">${r.thi.toFixed(4)}</div>
          <div style="font-size:.65rem;color:${col}">${r.status||thiStatus(r.thi)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Mini trend sparkline -->
  <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-bottom:14px">
    <div style="font-size:.7rem;color:var(--teal);font-weight:700;margin-bottom:8px">📈 THI Trend (Latest → Oldest)</div>

  // Draw THI trend chart
  setTimeout(()=>{

    charts['thi_chart'] = new Chart(el, {

      data:{

        datasets:[{
          label:'THI',
          data: rev.map(r=>r.thi),

      options:{

            h1:{type:'line',yMin:2.0,yMax:2.0,borderColor:'#ff5252',borderWidth:1,borderDash:[4,3]},
            h2:{type:'line',yMin:1.4,yMax:1.4,borderColor:'#f97316',borderWidth:1,borderDash:[4,3]},

function _initAero(){
  // Square canvas — use double rAF to ensure layout is complete
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const ac=document.getElementById('aero-canvas');
    if(ac){
      // Try parent, fallback to container calculation
      const wrap=document.getElementById('aero-wrap');
      let pw=(wrap?wrap.clientWidth:ac.parentElement.clientWidth)-12;
      if(pw<50){
        // Measure the aerodyn page width
        const page=document.getElementById('aerodyn');
        pw=page?Math.floor(page.clientWidth*0.28):380;
      }
      pw=Math.max(280,pw);
      ac.width=pw; ac.height=pw;
      ac.style.width=pw+'px'; ac.style.height=pw+'px';
    }
    const tc=document.getElementById('temp-canvas');
    if(tc){
      const tw=tc.parentElement.clientWidth||500;
      const th=Math.max(200,tc.parentElement.clientHeight-40);
      tc.width=tw; tc.height=th;
    }
    if(document.getElementById('aero-canvas')) _runAero();
  }));
}

function _runAero(){
  const ca=document.getElementById('aero-canvas');
  const ct=document.getElementById('temp-canvas');
  if(!ca&&!ct){aeroAnimId=null;return;}
  aeroTick++;
  if(ca) _drawDonut(ca.getContext('2d'),ca.width,ca.height);
  if(ct) _drawTemp(ct.getContext('2d'),ct.width,ct.height);
  aeroAnimId=requestAnimationFrame(_runAero);
}

function _drawDonut(ctx,W,H){
  ctx.clearRect(0,0,W,H);
  // Dark radial background
  const bg=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,W*0.65);
  bg.addColorStop(0,'#111f32'); bg.addColorStop(1,'#060a14');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  // outerR such that label zone (outerR*1.28) fits in canvas: outerR*1.28 + margin <= W/2
  const outerR = W * 0.30;
  const innerR = outerR * 0.38;

  const zones=AERO_ZONES.filter(z=>z.pct>0);
  const total=zones.reduce((s,z)=>s+z.pct,0);
  const segs=[];
  let ang=-Math.PI/2;

  // ── Pass 1: segments ──
  zones.forEach((z,i)=>{
    const sw=(z.pct/total)*Math.PI*2;
    const pulse=0.94+Math.sin(aeroTick*0.055+i*1.5)*0.05;
    const mid=ang+sw/2;
    segs.push({z,sw,ang,end:ang+sw,mid,pulse});

    // Segment fill
    ctx.beginPath();
    ctx.arc(cx,cy,outerR*pulse,ang,ang+sw);
    ctx.arc(cx,cy,innerR,ang+sw,ang,true);
    ctx.closePath();
    const a2=(0.65+Math.sin(aeroTick*0.04+i)*0.1).toFixed(2);
    ctx.fillStyle=z.color.replace(/[\d.]+\)$/,a2+')');
    ctx.fill();
    // Bright border
    ctx.beginPath();
    ctx.arc(cx,cy,outerR*pulse,ang,ang+sw);
    ctx.arc(cx,cy,innerR,ang+sw,ang,true);
    ctx.closePath();
    ctx.strokeStyle=z.color.replace(/[\d.]+\)$/,'0.95)');
    ctx.lineWidth=2.8; ctx.stroke();

    // Animated particle on rim
    const pA=ang+((aeroTick*0.026*(z.vel||1))%sw);
    const pr=outerR*pulse*0.92;
    const px=cx+pr*Math.cos(pA), py=cy+pr*Math.sin(pA);
    // Glow halo
    const halo=ctx.createRadialGradient(px,py,0,px,py,W*0.04);
    halo.addColorStop(0,z.color.replace(/[\d.]+\)$/,'0.7)'));
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(px,py,W*0.04,0,Math.PI*2);
    ctx.fillStyle=halo; ctx.fill();
    // Solid dot
    ctx.beginPath(); ctx.arc(px,py,W*0.016,0,Math.PI*2);
    ctx.fillStyle=z.color.replace(/[\d.]+\)$/,'1)'); ctx.fill();

    ang+=sw;
  });

  // ── Pass 2: BIG % labels outside ring, inside canvas ──
  segs.forEach(({z,mid,pulse})=>{
    // Label anchor at outerR*1.28 — stays inside W/2 since outerR=W*0.30 → 0.30*1.28=0.384 < 0.5
    const lR=outerR*1.28;
    const lx=cx+lR*Math.cos(mid), ly=cy+lR*Math.sin(mid);

    // Leader line: rim → label
    const rimX=cx+outerR*pulse*1.03*Math.cos(mid);
    const rimY=cy+outerR*pulse*1.03*Math.sin(mid);
    ctx.beginPath(); ctx.moveTo(rimX,rimY); ctx.lineTo(lx,ly);
    ctx.strokeStyle=z.color.replace(/[\d.]+\)$/,'0.85)');
    ctx.lineWidth=2.2; ctx.stroke();
    // Dot
    ctx.beginPath(); ctx.arc(rimX,rimY,4,0,Math.PI*2);
    ctx.fillStyle=z.color.replace(/[\d.]+\)$/,'1)'); ctx.fill();

    // Percentage — VERY LARGE WHITE BOLD
    const pFS=Math.max(18,W*0.075);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=18; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2;
    ctx.font=`900 ${pFS}px 'Share Tech Mono',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ffffff';
    ctx.fillText(`${z.pct.toFixed(1)}%`, lx, ly-pFS*0.38);

    // Zone name — bold, zone colour
    const nFS=Math.max(11,W*0.044);
    ctx.font=`bold ${nFS}px 'Rajdhani',sans-serif`;
    ctx.fillStyle=z.color.replace(/[\d.]+\)$/,'1)');
    ctx.shadowBlur=8;
    ctx.fillText(z.zone.split('(')[0].trim(), lx, ly+pFS*0.52);
    ctx.restore();
  });

  // ── Centre hole ──
  ctx.beginPath(); ctx.arc(cx,cy,innerR*0.94,0,Math.PI*2);
  const hole=ctx.createRadialGradient(cx,cy,0,cx,cy,innerR);
  hole.addColorStop(0,'rgba(8,14,28,.98)'); hole.addColorStop(1,'rgba(6,9,18,.94)');
  ctx.fillStyle=hole; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,innerR*0.94,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,212,184,.32)'; ctx.lineWidth=1.5; ctx.stroke();

  // Centre text
  const cFS=Math.max(15,W*0.068);
  ctx.save();
  ctx.shadowColor='rgba(0,212,184,.6)'; ctx.shadowBlur=14;
  ctx.font=`900 ${cFS}px 'Orbitron',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#00d4b8';
  ctx.fillText('GAS', cx, cy-cFS*0.55);
  ctx.fillText('FLOW', cx, cy+cFS*0.18);
  ctx.font=`bold ${Math.max(9,W*0.038)}px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(140,175,210,.72)';
  ctx.shadowBlur=5;
  ctx.fillText('Radial %', cx, cy+cFS*1.05);
  ctx.restore();

  // ── CWI/PWI corner ──
  const cwi=DB.aero.cwi||0.855, pwi=DB.aero.pwi||1.075;
  const kFS=Math.max(11,W*0.044);
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=8;
  ctx.font=`bold ${kFS}px 'Share Tech Mono',monospace`;
  ctx.textBaseline='alphabetic';
  ctx.textAlign='left';
  ctx.fillStyle='rgba(0,210,230,.88)'; ctx.fillText(`CWI = ${cwi}`, 8, H-kFS*1.55);
  ctx.fillStyle='rgba(255,135,40,.88)'; ctx.fillText(`PWI = ${pwi}`, 8, H-kFS*0.25);
  ctx.textAlign='right';
  ctx.fillStyle='rgba(160,190,220,.6)'; ctx.fillText('Wall-dominant', W-8, H-kFS*0.25);
  ctx.restore();
}

function _drawTemp(ctx,W,H){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#060a14'); bg.addColorStop(1,'#0a1220');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const pL=56,pR=20,pT=24,pB=42;
  const cW=W-pL-pR, cH=H-pT-pB;
  const maxT=2250, maxH=25;
  const CZ_H=DB.aero.cz_height||7;
  const RAFT_T=DB.aero.raft||2257;
  function tx(t){return pL+Math.min(1,Math.max(0,t/maxT))*cW;}
  function ty(h){return pT+cH-(h/maxH)*cH;}

  // Chart area tinted background
  const areaBg=ctx.createLinearGradient(pL,0,pL+cW,0);
  areaBg.addColorStop(0,'rgba(0,50,120,.22)');
  areaBg.addColorStop(0.5,'rgba(170,65,0,.15)');
  areaBg.addColorStop(1,'rgba(255,20,0,.24)');
  ctx.fillStyle=areaBg; ctx.fillRect(pL,pT,cW,cH);

  // Height gridlines + labels
  ctx.setLineDash([4,5]); ctx.lineWidth=1;
  [0,5,10,15,20,25].forEach(hm=>{
    const y=ty(hm);
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cW,y);
    ctx.strokeStyle='rgba(38,60,95,.65)'; ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=`bold ${Math.max(10,H*0.034)}px 'Share Tech Mono',monospace`;
    ctx.fillStyle='rgba(108,145,180,.88)'; ctx.textAlign='right';
    ctx.fillText(`${hm}m`,pL-5,y+4);
    ctx.setLineDash([4,5]);
  });
  // Temp gridlines + labels
  [0,500,1000,1500,2000].forEach(t=>{
    const x=tx(t);
    ctx.beginPath(); ctx.moveTo(x,pT); ctx.lineTo(x,pT+cH);
    ctx.strokeStyle='rgba(38,60,95,.42)'; ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=`${Math.max(10,H*0.033)}px 'Share Tech Mono',monospace`;
    ctx.fillStyle='rgba(108,145,180,.72)'; ctx.textAlign='center';
    ctx.fillText(`${t}`,x,pT+cH+17);
    ctx.setLineDash([4,5]);
  });
  ctx.setLineDash([]);

  // Three temperature curves
  const curves=[
    {key:'r1',color:'#ffc642',lw:3.2,label:'R1 Centre'},
    {key:'r3',color:'#00c9b1',lw:2.8,label:'R3 Mid-2'},
    {key:'r5',color:'#ff6830',lw:2.8,label:'R5 Wall'},
  ];
  curves.forEach(cv=>{
    // Subtle area fill
    ctx.save(); ctx.globalAlpha=0.07;
    ctx.beginPath();
    TEMP_PROFILE.forEach((p,i)=>{
      if(i===0){ctx.moveTo(pL,ty(p.h)); ctx.lineTo(tx(p[cv.key]),ty(p.h));}
      else ctx.lineTo(tx(p[cv.key]),ty(p.h));
    });
    const lp=TEMP_PROFILE[TEMP_PROFILE.length-1];
    ctx.lineTo(pL,ty(lp.h)); ctx.closePath();
    ctx.fillStyle=cv.color; ctx.fill();
    ctx.restore();

    // Main line
    ctx.beginPath();
    TEMP_PROFILE.forEach((p,i)=>{
      if(i===0)ctx.moveTo(tx(p[cv.key]),ty(p.h));
      else ctx.lineTo(tx(p[cv.key]),ty(p.h));
    });
    ctx.strokeStyle=cv.color; ctx.lineWidth=cv.lw; ctx.stroke();

    // Dots
    TEMP_PROFILE.forEach(p=>{
      ctx.beginPath(); ctx.arc(tx(p[cv.key]),ty(p.h),4.5,0,Math.PI*2);
      ctx.fillStyle=cv.color; ctx.fill();
    });

    // End label
    const ep=TEMP_PROFILE[TEMP_PROFILE.length-1];
    ctx.save(); ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=9;
    ctx.font=`bold ${Math.max(11,H*0.036)}px 'Share Tech Mono',monospace`;
    ctx.fillStyle=cv.color; ctx.textAlign='left';
    ctx.fillText(cv.label, tx(ep[cv.key])+7, ty(ep.h)+4);
    ctx.restore();
  });

  // CZ pulsing band + line
  const czY=ty(CZ_H);
  const czP=0.55+Math.sin(aeroTick*0.07)*0.3;
  ctx.save(); ctx.globalAlpha=czP*0.14;
  ctx.fillStyle='#00dc78';
  ctx.fillRect(pL,czY-11,cW,22);
  ctx.restore();
  ctx.beginPath(); ctx.moveTo(pL,czY); ctx.lineTo(pL+cW,czY);
  ctx.strokeStyle=`rgba(0,225,110,${0.78+czP*0.18})`;
  ctx.lineWidth=3; ctx.setLineDash([14,7]); ctx.stroke(); ctx.setLineDash([]);
  // CZ label — LARGE AND BOLD
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=16; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
  ctx.font=`900 ${Math.max(13,H*0.046)}px 'Rajdhani',sans-serif`;
  ctx.fillStyle=`rgba(0,240,120,${0.92+czP*0.07})`;
  ctx.textAlign='left';
  ctx.fillText(`⊕  CZ ≈ 1200°C  |  h = ${CZ_H}m above Tuyere`, pL+8, czY-14);
  ctx.restore();
  // Left arrow
  ctx.beginPath(); ctx.moveTo(pL-22,czY); ctx.lineTo(pL-5,czY);
  ctx.moveTo(pL-12,czY-5); ctx.lineTo(pL-5,czY); ctx.lineTo(pL-12,czY+5);
  ctx.strokeStyle=`rgba(0,220,110,${0.75+czP*0.2})`; ctx.lineWidth=2.2; ctx.stroke();

  // 1200°C vertical ref
  ctx.beginPath(); ctx.moveTo(tx(1200),pT); ctx.lineTo(tx(1200),pT+cH);
  ctx.strokeStyle=`rgba(0,200,100,${0.2+czP*0.1})`;
  ctx.lineWidth=1; ctx.setLineDash([7,8]); ctx.stroke(); ctx.setLineDash([]);

  // RAFT label
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=10;
  ctx.font=`bold ${Math.max(11,H*0.039)}px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(255,115,40,.94)'; ctx.textAlign='right';
  ctx.fillText(`RAFT = ${RAFT_T.toFixed(0)}°C`, pL+cW-5, ty(0)-9);
  ctx.restore();

  // Axes
  ctx.strokeStyle='rgba(50,80,115,.75)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pL,pT); ctx.lineTo(pL,pT+cH); ctx.lineTo(pL+cW,pT+cH); ctx.stroke();
  ctx.font=`${Math.max(10,H*0.033)}px 'Rajdhani',sans-serif`;
  ctx.fillStyle='rgba(0,212,184,.55)'; ctx.textAlign='center';
  ctx.fillText('Temperature (°C)', pL+cW/2, H-5);
  ctx.save(); ctx.translate(14,pT+cH/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle='rgba(0,212,184,.5)'; ctx.fillText('Height from Tuyere (m)',0,0); ctx.restore();
}

/* ── ANOMALY ─────────────────────────────── */
function rnAnomaly(){
  const WIN15 = 900; const WIN2H = 7200;
  // Helper: get MA value from ring buffer
  const ma15 = sno => computeMA(sno, WIN15);
  const ma2h  = sno => computeMA(sno, WIN2H);

  // ── LIVE SENSOR INPUTS ─────────────────────────────────────────────────
  const DB_INP = DB.anomaly_inputs || {};
  // Default values from DB (actual plant sensor readings)
  const DEF = {
    cbf15:  DB_INP.cbf15  || 1020,   cbf2h:  DB_INP.cbf2h  || 1050,   // Nm3/min
    hbp15:  DB_INP.hbp15  || 1010,   hbp2h:  DB_INP.hbp2h  || 980,    // kPa
    toppr15:DB_INP.toppr15|| 1.85,   toppr2h:DB_INP.toppr2h || 2.0,    // bar
    hmt_cur:DB_INP.hmt_cur|| 1429,   hmt_last:DB_INP.hmt_last||1440,  // °C
    cast_st:DB_INP.cast_st|| 1,      cast_min:DB_INP.cast_min|| 30,    // 1=open
    tdp15:  DB_INP.tdp15  || 2.10,   tdp2h:  DB_INP.tdp2h  || 1.95,   // bar
    ldp15:  DB_INP.ldp15  || 1.00,   ldp2h:  DB_INP.ldp2h  || 0.97,
    udp15:  DB_INP.udp15  || 0.30,   udp2h:  DB_INP.udp2h  || 0.25,
    radar5m:DB_INP.radar5m|| 1.10,   radar_c:DB_INP.radar_c || 1.10,
    stk1_c: DB_INP.stk1_c || 0.80,  stk1_5m:DB_INP.stk1_5m || 0.80,
    stk2_c: DB_INP.stk2_c || 0.80,  stk2_5m:DB_INP.stk2_5m || 0.80,
  };

  // Mode: LIVE or SIMULATION
  if(!window._anomMode) window._anomMode = 'live';
  const mode = window._anomMode;

  // In LIVE mode: try to get values from ring buffer MAs (fall back to DB defaults)
  // In SIMULATION mode: use user-entered values from input fields
  // Preserve simulation values across re-renders
  if(!window._anomInputs) window._anomInputs = {};
  if(mode==='sim'){
    // Save existing input values before re-render
    const existFields = ['cbf15','cbf2h','hbp15','hbp2h','toppr15','toppr2h',
      'hmt_cur','hmt_last','cast_st','cast_min','tdp15','tdp2h',
      'ldp15','ldp2h','udp15','radar5m','radar_c','stk1_c','stk1_5m','stk2_c','stk2_5m'];
    existFields.forEach(id=>{
      const el=document.getElementById('anin_'+id);
      if(el) window._anomInputs[id]=parseFloat(el.value)||window._anomInputs[id]||0;
    });
  }
  function getVal(id, def){
    if(mode==='sim'){
      return (window._anomInputs[id] !== undefined) ? window._anomInputs[id] : def;
    }
    return def;
  }

  // Compute anomaly modules
  function computeModules(){
    const cbf15  = getVal('cbf15',DEF.cbf15);   const cbf2h  = getVal('cbf2h',DEF.cbf2h);
    const hbp15  = getVal('hbp15',DEF.hbp15);   const hbp2h  = getVal('hbp2h',DEF.hbp2h);
    const toppr15= getVal('toppr15',DEF.toppr15);const toppr2h= getVal('toppr2h',DEF.toppr2h);
    const hmt_cur= getVal('hmt_cur',DEF.hmt_cur);const hmt_last=getVal('hmt_last',DEF.hmt_last);
    const cast_st= getVal('cast_st',DEF.cast_st);const cast_min=getVal('cast_min',DEF.cast_min);
    const tdp15  = getVal('tdp15',DEF.tdp15);   const tdp2h  = getVal('tdp2h',DEF.tdp2h);
    const ldp15  = getVal('ldp15',DEF.ldp15);   const ldp2h  = getVal('ldp2h',DEF.ldp2h);
    const udp15  = getVal('udp15',DEF.udp15);
    const radar5m= getVal('radar5m',DEF.radar5m);const radar_c=getVal('radar_c',DEF.radar_c);
    const stk1_c = getVal('stk1_c',DEF.stk1_c); const stk1_5m=getVal('stk1_5m',DEF.stk1_5m);
    const stk2_c = getVal('stk2_c',DEF.stk2_c); const stk2_5m=getVal('stk2_5m',DEF.stk2_5m);

    // MODULE 1: CBF↑ & HBP↓
    const cbf_d1  = cbf2h > 0 ? (cbf15 - cbf2h)/cbf2h*100 : 0;
    const hbp_d1  = hbp2h > 0 ? (hbp2h - hbp15)/hbp2h*100 : 0;
    const toppr_d = toppr2h > 0 ? (toppr2h - toppr15)/toppr2h*100 : 0;
    const hmt_d   = Math.abs(hmt_cur - hmt_last);
    const m1_trig = cbf_d1 > 2.5 && hbp_d1 > 2.5;
    const m1_stat = m1_trig ? '⚠ CAUTION' : '✅ NOT TRIGGERED';
    const m1_col  = m1_trig ? 'var(--or)' : 'var(--grn)';

    // MODULE 2: CBF↓ & HBP↑
    const cbf_d2 = cbf2h > 0 ? (cbf2h - cbf15)/cbf2h*100 : 0;
    const hbp_d2 = hbp2h > 0 ? (hbp15 - hbp2h)/hbp2h*100 : 0;
    const ldp_d  = ldp2h > 0 ? (ldp15 - ldp2h)/ldp2h*100 : 0;
    const m2_prim = cbf_d2 > 2.5 && hbp_d2 > 2.5;
    let m2_stat, m2_col, m2_act;
    if(!m2_prim){ m2_stat='✅ NOT TRIGGERED'; m2_col='var(--grn)'; m2_act='Primary not triggered.'; }
    else if(cast_st===1){
      if(hmt_cur >= 1440){ m2_stat='🔴 CRITICAL'; m2_col='var(--red)'; m2_act='Cast OPEN, HMT≥1440°C — Reduce wind, check pressure.'; }
      else { m2_stat='⚠ CAUTION'; m2_col='var(--or)'; m2_act='Cast OPEN — Reduce wind and maintain UDP < 0.3'; }
    } else {
      if(cast_min > 40 && ldp_d >= 8 && udp15 > 0.3){ m2_stat='🔴 CRITICAL'; m2_col='var(--red)'; m2_act='Cast CLOSED >40min, LDP+UDP elevated — Immediate action required.'; }
      else { m2_stat='⚠ CAUTION'; m2_col='var(--or)'; m2_act='Cast CLOSED — Monitor LDP/UDP closely.'; }
    }

    // MODULE 3: ΔP Increase
    const tdp_d  = tdp2h > 0 ? (tdp15 - tdp2h)/tdp2h*100 : 0;
    const m3_prim = tdp_d >= 7;
    let m3_stat, m3_col, m3_act;
    if(!m3_prim){ m3_stat='✅ NOT TRIGGERED'; m3_col='var(--grn)'; m3_act='ΔP rise below 7% threshold.'; }
    else if(toppr_d > 2){ m3_stat='⚠ CAUTION'; m3_col='var(--or)'; m3_act='Total DP Δ≥7% but TOP PR Δ>2% — Monitor ΔP closely.'; }
    else if(ldp_d >= 8 && udp15 >= 0.3){ m3_stat='🔴 CRITICAL'; m3_col='var(--red)'; m3_act='ΔP elevated — BOTH LDP+UDP triggered. Reduce wind immediately.'; }
    else { m3_stat='⚠ CAUTION'; m3_col='var(--or)'; m3_act='ΔP elevated — Monitor LDP and UDP closely.'; }

    // MODULE 4: Hanging
    const radar_stuck = Math.abs(radar5m - radar_c) < 0.001;
    const stk1_stuck  = Math.abs(stk1_5m - stk1_c) < 0.001;
    const stk2_stuck  = Math.abs(stk2_5m - stk2_c) < 0.001;
    const m4_trig = radar_stuck && stk1_c > 0.2 && stk1_stuck && stk2_c > 0.2 && stk2_stuck;
    const m4_stat = m4_trig ? '🔴 CRITICAL — HANGING' : '✅ NOT TRIGGERED';
    const m4_col  = m4_trig ? 'var(--red)' : 'var(--grn)';
    const m4_act  = m4_trig
      ? '1. HANGING detected — Inspect burden distribution immediately\n2. Reduce wind if required\n3. Follow SOP for hanging remediation'
      : 'No hanging indicators. Stockline descending normally.';

    return {cbf_d1,hbp_d1,cbf_d2,hbp_d2,toppr_d,hmt_d,ldp_d,tdp_d,
            m1_trig,m1_stat,m1_col,m2_prim,m2_stat,m2_col,m2_act,
            m3_prim,m3_stat,m3_col,m3_act,m4_trig,m4_stat,m4_col,m4_act,
            radar_stuck,stk1_stuck,stk2_stuck,
            cbf15,cbf2h,hbp15,hbp2h,toppr15,toppr2h,
            hmt_cur,hmt_last,cast_st,cast_min,tdp15,tdp2h,ldp15,ldp2h,udp15,
            radar5m,radar_c,stk1_c,stk1_5m,stk2_c,stk2_5m};

function rnSlipModule() {
  const el = document.getElementById('anomaly');
  if (!el) return;

  const pe   = DB.prod_est;
  const aero = DB.aero;
  const lp   = DB.latest_params;
  const getLP = (name) => {
    const pdef = PARAM_DEFS.find(p=>p.param===name);
    if(pdef){ const v=curVal(pdef.sno); if(v!==null) return v; }
    return (lp.find(p => p.parameter === name) || {}).latest_value || 0;
  };

  const hmpTPD = pe.est_hmp_tpd || 844;
  const dpNow  = getLP('Furnace Total Dp');
  const gasNow = getLP('BFGas Generation');
  const cwi    = getLP('CWI') || aero.cwi || 0.855;
  const pwi    = getLP('PWI') || aero.pwi || 1.075;

  const ls      = DB.live_series; // kept for non-live params
  const dpSno   = 16; // Furnace Total Dp
  const gasSno  = 20; // BFGas Generation
  const dpArr   = ringBuf[dpSno] ? ringBuf[dpSno].map(x=>x.v) : (ls['Furnace Total Dp'] || []);
  const gasArr  = ringBuf[gasSno] ? ringBuf[gasSno].map(x=>x.v) : (ls['BFGas Generation'] || []);
  const dpPrev  = dpArr[Math.max(0, dpArr.length - 25)] || dpNow;
  const gasPrev = gasArr[Math.max(0, gasArr.length - 25)] || gasNow;

  const BR = 2.4, rho = 1.85, A = 10.8;
  const hmRate    = hmpTPD / 24;
  const mBurden   = hmRate * BR;
  const vConsumed = mBurden / rho;
  const bdrExp    = (vConsumed / A).toFixed(3);
  const dpChange  = +(dpNow - dpPrev).toFixed(4);
  const gasPct    = gasPrev > 0 ? +((gasNow - gasPrev) / gasPrev * 100).toFixed(2) : 0;
  const gasImbal  = +Math.abs(cwi - pwi).toFixed(3);

  const srf        = Math.min(1, Math.max(0, (dpChange / Math.max(0.001, dpNow)) + (Math.max(0, -gasPct) / 100)));
  const dpScore    = Math.min(1, Math.max(0, dpChange / 0.2));
  const gasImbalSc = Math.min(1, Math.max(0, gasImbal / 0.4));
  const gasDropSc  = Math.min(1, Math.max(0, Math.max(0, -gasPct) / 15));
  const slipRisk   = +(0.40 * srf + 0.30 * dpScore + 0.30 * gasImbalSc).toFixed(3);

  const dpFlag       = dpChange > 0.05 ? 1 : 0;
  const gasDropFlag  = gasPct < -5 ? 1 : 0;
  const gasImbalFlag = gasImbal > 0.15 ? 1 : 0;
  const precCount    = dpFlag + gasDropFlag + gasImbalFlag;

  const rL = slipRisk > 0.7 ? '\u{1F534} SLIP IMMINENT' : slipRisk > 0.4 ? '\u{1F7E0} HANGING RISK' : slipRisk > 0.1 ? '\u{1F7E1} WATCH' : '\u{1F7E2} STABLE';
  const rC = slipRisk > 0.7 ? '#ff5252' : slipRisk > 0.4 ? '#ff9800' : slipRisk > 0.1 ? '#ffc642' : '#00e676';
  const pC = precCount >= 3 ? '#ff5252' : precCount >= 2 ? '#ff9800' : precCount >= 1 ? '#ffc642' : '#00e676';
  const act = slipRisk > 0.7 ? '\u{1F6A8} CUT BLAST immediately \u2014 alert casthouse \u2014 all teams standby' :
              slipRisk > 0.4 ? '\u26A0 Reduce blast 5% \u2014 check CWI/PWI \u2014 prep burden correction' :
              slipRisk > 0.1 ? '\u{1F50D} Increase monitoring \u2014 review burden \u2014 check gas distribution' :
              '\u2705 Continue normal operation \u2014 monitor 2-hourly';

  const bar = (v) => {
    const p = Math.min(100, v * 100);
    const c = p > 70 ? '#ff5252' : p > 40 ? '#ff9800' : p > 10 ? '#ffc642' : '#00e676';
    return '<div style="background:#1e2d3d;border-radius:4px;height:7px;width:100%"><div style="background:' + c + ';height:7px;border-radius:4px;width:' + p.toFixed(1) + '%"></div></div>';
  };
  const fb = (flag, on, off) => flag
    ? '<span style="background:#ff5252;color:#fff;padding:1px 6px;border-radius:3px;font-size:.7rem">\u26A0 ' + on + '</span>'
    : '<span style="background:#193d2a;color:#00e676;padding:1px 6px;border-radius:3px;font-size:.7rem">\u2714 ' + off + '</span>';

  const slipHTML = '<div style="margin-top:14px;border:2px solid ' + rC + '55;border-radius:6px;overflow:hidden">'
    + '<div style="background:linear-gradient(135deg,#2d1111,#1a0808);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">'
    + '<div><div style="font-size:.82rem;font-weight:700;color:#ff8a80">\uD83D\uDD34 MODULE 5 \u2014 SLIP PREDICTION ENGINE</div>'
    + '<div style="font-size:.63rem;color:#aaa;margin-top:2px">Burden Descent Rate \u00B7 SRF \u00B7 Combined SlipRisk Index</div></div>'
    + '<div style="text-align:right"><div style="font-size:1.8rem;font-weight:900;color:' + rC + ';line-height:1">' + slipRisk.toFixed(3) + '</div>'
    + '<div style="font-size:.63rem;color:#aaa">Combined SlipRisk</div></div></div>'
    + '<div style="background:' + rC + '18;border-bottom:1px solid ' + rC + '33;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">'
    + '<div style="font-size:.9rem;font-weight:700;color:' + rC + '">' + rL + '</div>'
    + '<div style="font-size:.7rem;color:#ccc;max-width:420px;text-align:right">' + act + '</div></div>'
    + '<div style="padding:12px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:#0d1a26">'
    /* COL 1: Inputs */
    + '<div><div style="font-size:.7rem;color:#00c9b1;font-weight:600;margin-bottom:6px">\uD83D\uDCE5 LIVE INPUTS &amp; CORE CALCS</div>'
    + '<div class="tw"><table>'
    + '<tr><th>Parameter</th><th>Value</th><th>Unit</th></tr>'
    + '<tr><td>HM Production</td><td style="color:#00c9b1">' + hmpTPD.toFixed(1) + '</td><td>TPD</td></tr>'

// ============================================================
// FORMAT HELPER
// ============================================================
function fmtVal(v) {
  if (v === null || v === undefined || v === '') return '—';
  if (typeof v === 'number') return isNaN(v) ? '—' : v.toFixed(2);
  return v;
}

function isOOR(v, rangeStr) {
  if (!rangeStr || rangeStr === '-' || rangeStr === '' || rangeStr === 'Balance' || rangeStr === 'calc') return false;
  if (typeof v !== 'number' || isNaN(v)) return false;
  const parts = String(rangeStr).split('-');
  if (parts.length === 2) {
    const lo = parseFloat(parts[0]), hi = parseFloat(parts[1]);
    if (!isNaN(lo) && !isNaN(hi)) return (v < lo || v > hi);
  }
  return false;
}

// ── Send message ───────────────────────────────────────────────────────
async function aiSend() {
  const input = document.getElementById('ai-input');
  const q = (input.value || '').trim();
  if (!q || window._aiTyping) return;
  input.value = '';
  input.style.height = 'auto';
  aiAsk(q);
}

async function aiAsk(question) {
  if (window._aiTyping) return;
  window._aiTyping = true;

  const msgs    = document.getElementById('ai-msgs');
  const sendBtn = document.getElementById('ai-send-btn');
  const status  = document.getElementById('ai-status');
  if (!msgs) return;

  // Append user message
  _appendMsg(question, 'user');
  if (sendBtn) sendBtn.disabled = true;
  if (status) status.textContent = 'Analysing your query…';

  // Add typing indicator
  const typingDiv = document.createElement('div');
  typingDiv.className = 'ai-msg';
  typingDiv.id = 'ai-typing';
  typingDiv.innerHTML = `<div class="ai-avatar bot">🤖</div>
    <div class="ai-bubble bot"><div class="ai-typing">
      <span></span><span></span><span></span>
    </div></div>`;
  msgs.appendChild(typingDiv);
  msgs.scrollTop = msgs.scrollHeight;

  // Build message history for API
  const systemPrompt = _buildAIContext();
  if (!window._aiHistory.length) {
    window._aiHistory.push({ role: 'user', content: '(context loaded)' });
    window._aiHistory.push({ role: 'assistant', content: 'Context loaded. Ready to help with your blast furnace queries.' });
  }
  window._aiHistory.push({ role: 'user', content: question });

  // Keep history manageable (last 12 turns)
  const msgHistory = window._aiHistory.slice(-12).filter(m => !m._html || m.role !== 'assistant').map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content.slice(0, 2000) : ''
  })).filter(m => m.content);

  try {
    // Get API key from localStorage
    const apiKey = localStorage.getItem('ironiq_api_key') || '';
    if(!apiKey){
      const td2 = document.getElementById('ai-typing');
      if(td2) td2.remove();
      window._aiTyping = false;
      const sb2 = document.getElementById('ai-send-btn');
      if(sb2) sb2.disabled = false;
      _showApiKeyPrompt();
      return;
    }
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: msgHistory
      })
    });

    const data = await resp.json();
    let text = '';
    if (resp.status === 401 || (data.error && data.error.type === 'authentication_error')) {
      localStorage.removeItem('ironiq_api_key');
      text = '⚠ API key is invalid or expired. Please enter a valid key.';
      setTimeout(()=>rnAI(), 500);
    } else if (data.content && data.content[0] && data.content[0].text) {
      text = data.content[0].text;
    } else if (data.error) {
      text = `⚠ API Error: ${data.error.message || JSON.stringify(data.error)}`;
    }

    // Remove typing indicator
    const td = document.getElementById('ai-typing');
    if (td) td.remove();

    // Parse and render response
    const rendered = _renderAIResponse(text);
    const botDiv = document.createElement('div');
    botDiv.className = 'ai-msg';
    botDiv.style.animation = 'fadeIn .3s ease';
    botDiv.innerHTML = `<div class="ai-avatar bot">🤖</div>
      <div class="ai-bubble bot">${rendered.html}</div>`;
    msgs.appendChild(botDiv);
    msgs.scrollTop = msgs.scrollHeight;

    // Render any charts requested
    if (rendered.charts.length) {
      setTimeout(() => _renderAICharts(rendered.charts), 100);
    }

    // Save to history
    window._aiHistory.push({ role: 'assistant', content: text, _html: rendered.html });
    if (status) status.textContent = `Ready · ${new Date().toLocaleTimeString()} · ${window._aiHistory.length/2|0} turns`;

  } catch (err) {
    const td = document.getElementById('ai-typing');
    if (td) td.remove();
    const isApiKey = err.message && err.message.includes('401');
    const errDiv = document.createElement('div');
    errDiv.className = 'ai-msg';
    errDiv.innerHTML = '<div class="ai-avatar bot">🤖</div>' +
      '<div class="ai-bubble bot"><span class="warn">⚠ ' +
      (err.message==='Failed to fetch'
        ? 'Cannot connect to AI API from local file.<br>' +
          '<b>To enable AI:</b> Open this file via a web server, or use the <b>Data Analysis</b> tab for offline analytics.'
        : 'Error: ' + err.message) +
      '</span><br><small style="color:#3a5a70;font-size:.62rem">' +
      'Tip: The Data Analysis sheet (nav bar) works fully offline with all charts and comparisons.</small></div>';
    msgs.appendChild(errDiv);
    msgs.scrollTop = msgs.scrollHeight;
  }

  window._aiTyping = false;
  const sb = document.getElementById('ai-send-btn');
  if (sb) sb.disabled = false;
  const inp = document.getElementById('ai-input');
  if (inp) inp.focus();
}

// ── Render AI response to HTML ─────────────────────────────────────────
function _renderAIResponse(text) {
  const charts = [];
  let html = text;

  // Extract CHART_JSON blocks
  html = html.replace(/CHART_JSON\{([\s\S]*?)\}/g, (match, json) => {
    try {
      const cfg = JSON.parse('{' + json + '}');
      const cid = 'ai-chart-' + Math.random().toString(36).slice(2,8);
      charts.push({ id: cid, cfg });
      return `<div class="ai-chart-box"><canvas id="${cid}"></canvas></div>`;
    } catch(e) { return ''; }
  });

  // Format markdown-style
  html = html
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/\*([^*]+)\*/g, '<i>$1</i>')
    .replace(/^### (.+)$/gm, '<b style="color:#00c9b1;font-size:.78rem;display:block;margin:8px 0 4px">$1</b>')
    .replace(/^## (.+)$/gm,  '<b style="color:#ffd740;font-size:.82rem;display:block;margin:10px 0 5px">$1</b>')
    .replace(/^# (.+)$/gm,   '<b style="color:#ff9800;font-size:.88rem;display:block;margin:10px 0 5px">$1</b>')
    .replace(/^- (.+)$/gm,   '<div style="margin:2px 0 2px 12px">• $1</div>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="margin:2px 0 2px 12px">$1. $2</div>')
    .replace(/⚠/g, '<span class="warn">⚠</span>')
    .replace(/🔴/g, '<span class="crit">🔴</span>')
    .replace(/✅|🟢/g, '<span class="ok">$&</span>')
    .replace(/`([^`]+)`/g, '<code style="background:#0a1f35;color:#00c9b1;padding:1px 5px;border-radius:3px;font-size:.7rem">$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');

  return { html, charts };
}

// ── Render chart from AI config ───────────────────────────────────────
function _renderAICharts(charts) {
  charts.forEach(({ id, cfg }) => {
    const el = document.getElementById(id);
    if (!el) return;
    try {
      if (typeof Chart === 'undefined') return;
      new Chart(el, {
        type: cfg.type || 'line',
        data: cfg.data,
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#7a90a8', font: { size: 9 } } },
            title: cfg.title ? { display: true, text: cfg.title, color: '#00c9b1', font: { size: 10 } } : undefined
          },
          scales: cfg.type !== 'pie' && cfg.type !== 'doughnut' ? {
            x: { ticks: { color: '#4a5f75', font: { size: 8 } }, grid: { color: '#1a2a3a' } },
            y: { ticks: { color: '#4a5f75', font: { size: 8 } }, grid: { color: '#1a2a3a' } }
          } : undefined
        }
      });
    } catch(e) { console.warn('AI chart error:', e); }
  });
}

// ── Helpers ────────────────────────────────────────────────────────────
function _appendMsg(text, role) {
  const msgs = document.getElementById('ai-msgs');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  const icon = role === 'user' ? '👤' : '🤖';
  div.innerHTML = `<div class="ai-avatar ${role}">${icon}</div>
    <div class="ai-bubble ${role}">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function _showApiKeyPrompt(){
  // Show API key input prominently
  const bar = document.getElementById('ai-apikey-bar');
  if(bar){ bar.style.display='flex'; bar.scrollIntoView({behavior:'smooth'}); }
  const msgs = document.getElementById('ai-msgs');
  if(msgs){
    const div=document.createElement('div');
    div.className='ai-msg';
    div.innerHTML='<div class="ai-avatar bot">🤖</div>' +
      '<div class="ai-bubble bot">' +
      '<b style="color:#ffd740">🔑 API Key Required</b><br><br>' +
      'To use the AI Analyst, please enter your <b>Anthropic API key</b> in the bar above.<br><br>' +
      '<b>How to get one:</b><br>' +
      '• Go to <span style="color:#00c9b1">console.anthropic.com</span><br>' +
      '• Sign up / Log in → API Keys → Create Key<br>' +
      '• Copy the key (starts with <code style="color:#00c9b1">sk-ant-api...</code>)<br>' +
      '• Paste it in the key bar above and click SAVE KEY<br><br>' +
      '<small style="color:#3a5a70">Your key is stored only in your browser localStorage.' +
      ' It is sent directly to Anthropic — never to any other server.</small>' +
      '</div>';
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  }
}

function aiClear() {
  window._aiHistory = [];
  window._aiTyping = false;
  rnAI();
}
