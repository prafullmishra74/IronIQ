<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// Fallback: if Chart.js CDN fails (file:// protocol blocks CDN), use minimal stub
// that renders bars/lines as simple HTML tables instead
if(typeof Chart==='undefined'){
  window.Chart=function(el,cfg){
    this.destroy=function(){};
    this.data=cfg.data||{datasets:[]};
    this.update=function(){};
    // Render a simple ASCII-style table in the canvas parent
    try{
      const parent=el.parentElement;
      if(!parent||parent._chartFilled)return;
      parent._chartFilled=true;
      const d=cfg.data||{};
      const labels=(d.labels||[]).slice(-12);
      const ds=(d.datasets||[]).slice(0,3);
      let rows='';
      ds.forEach(set=>{
        const vals=(set.data||[]).slice(-labels.length);
        const max=Math.max(...vals.filter(v=>typeof v==='number'),1);
        rows+=`<div style="margin:2px 0;font-size:9px;color:${set.borderColor||'#7a90a8'}">
          ${set.label||''}:&nbsp;${vals.map(v=>typeof v==='number'?v.toFixed(1):'—').join(', ')}</div>`;
      });
      parent.innerHTML=`<div style="padding:8px;font-size:9px;color:#4a5f75;
        border:1px solid #1c2330;border-radius:4px;min-height:60px">
        <div style="color:#ffc642;font-weight:700;margin-bottom:4px">
          Chart.js not loaded (offline mode)</div>${rows}</div>`;
    }catch(e){}
  };
  console.warn('Chart.js CDN unavailable — using offline fallback');
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{

/* HEADER */
header{background:linear-gradient(90deg,#0a1628 0%,#071020 40%,#0a0d18 100%);

.hdr-left h1{font-size:.95rem;background:linear-gradient(90deg,var(--teal),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:800;letter-spacing:.4px}
.hdr-left h2{font-size:.68rem;color:var(--mu);margin-top:2px}
.hdr-right{display:flex;gap:12px;align-items:center}
.live-badge{display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,rgba(0,201,177,.15),rgba(0,200,100,.1));
  color:var(--teal);font-size:.68rem;font-weight:700;
  border:1px solid var(--teal3);padding:4px 11px;border-radius:20px}
.pulse{width:7px;height:7px;background:var(--teal);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
#clock{color:var(--gold);font-size:.78rem;font-weight:600;font-family:'Courier New',monospace;
  background:rgba(255,198,66,.08);padding:3px 8px;border-radius:6px;border:1px solid rgba(255,198,66,.2)}

/* NAV */
nav{display:flex;gap:3px;padding:7px 20px;background:var(--bg2);

nav button.active{background:linear-gradient(135deg,rgba(0,201,177,.2),rgba(56,217,245,.1));
  color:var(--teal);border-color:var(--teal);font-weight:600}

/* PAGES */
.page{display:none;padding:14px 18px}
.page.active{display:block}

/* KPI CARDS */
.krow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;
  padding:11px 14px;min-width:130px;flex:1;position:relative;overflow:hidden;transition:border-color .3s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0}
.kpi.t::before{background:linear-gradient(90deg,var(--teal),var(--cyan))}
.kpi.g::before{background:linear-gradient(90deg,var(--grn),#00e676aa)}
.kpi.a::before{background:linear-gradient(90deg,var(--gold),#ffcc00)}
.kpi.r::before{background:linear-gradient(90deg,var(--red),#ff8a80)}
.kpi.m::before{background:linear-gradient(90deg,var(--mag),#ce93d8)}
.kpi.b::before{background:linear-gradient(90deg,var(--blu),#82b1ff)}

.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

</style>

      onkeydown="if(event.key==='Enter')window._iqLogin()">
    
    <div id="iq-err" style="color:#ff5252;font-size:.72rem;margin-top:6px;
      min-height:16px;display:none"></div>
    
    <button onclick="window._iqLogin()" id="iq-btn"
      style="width:100%;margin-top:14px;
        background:linear-gradient(135deg,#00c9b1,#38d9f5);
        color:#07080d;border:none;border-radius:8px;
        padding:12px;font-weight:700;font-size:.88rem;
        cursor:pointer;transition:opacity .2s;letter-spacing:.2px">
      Access Dashboard →
    </button>
  </div>

  <p style="color:#243040;font-size:.65rem;margin-top:8px">
    Secured deployment — source not accessible
  </p>
</div>

<script>

// ════════════════════════════════════════════════════════
//  IRON-IQ  —  SECURE CLIENT BOOTSTRAP
//  All data and scoring logic lives on the server.
//  This file contains only UI rendering code.
//  Data is fetched after authentication.
// ════════════════════════════════════════════════════════

// ── Safe fallbacks until server data loads (prevents ReferenceError at parse time)
window.XLDATA     = window.XLDATA     || null;
window.DB         = window.DB         || null;
window.PARAM_DEFS = window.PARAM_DEFS || [];
window.RM         = window.RM         || null;
window.IOD        = window.IOD        || null;
window.charts     = window.charts     || {};
const charts = window.charts;

function f(v, d = 1) {
  if (v === null || v === undefined || v === '') return '—';
  const num = Number(v);
  return Number.isFinite(num) ? num.toFixed(d) : '—';
}

function fk(v) {
  if (v === null || v === undefined || v === '') return '—';
  const num = Number(v);
  return Number.isFinite(num) ? (num / 1000).toFixed(1) + 'k' : '—';
}

function tag(label, cls = 'info') {
  const safeLabel = label === null || label === undefined || label === '' ? '—' : String(label);
  return `<span class="tag ${cls || 'info'}">${safeLabel}</span>`;
}

function mergeChartOptions(base, extra) {
  if (!extra || typeof extra !== 'object') return { ...base };
  const out = Array.isArray(base) ? [...base] : { ...base };
  Object.keys(extra).forEach(key => {
    const baseVal = out[key];
    const extraVal = extra[key];
    if (
      baseVal && extraVal &&
      typeof baseVal === 'object' && typeof extraVal === 'object' &&
      !Array.isArray(baseVal) && !Array.isArray(extraVal)
    ) {
      out[key] = mergeChartOptions(baseVal, extraVal);
    } else {
      out[key] = extraVal;
    }
  });
  return out;
}

function mkLine(id, labels, datasets, extraOptions) {
  const el = document.getElementById(id);
  if (!el) return null;

  if (charts[id]) {
    try { charts[id].destroy(); } catch (e) {}
    delete charts[id];
  }

  const baseOptions = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: true, labels: { color: '#7a90a8', font: { size: 10 } } } },
    scales: {
      x: { ticks: { color: '#4a5f75', maxTicksLimit: 8, font: { size: 8 } }, grid: { color: '#1c2330' } },
      y: { ticks: { color: '#4a5f75', font: { size: 8 } }, grid: { color: '#1c2330' } }
    }
  };

  charts[id] = new Chart(el, {
    type: 'line',
    data: {
      labels: labels || [],
      datasets: (datasets || []).map(ds => ({ fill: false, tension: 0.3, pointRadius: 0, borderWidth: 1.5, ...ds }))
    },
    options: mergeChartOptions(baseOptions, extraOptions || {})
  });

  return charts[id];
}

// ── Session token (memory only — never persisted to localStorage)
window._IQ_TOKEN = null;

// ── Show error on login screen
function _iqError(msg) {
  const el = document.getElementById('iq-err');
  el.textContent = msg;
  el.style.display = 'block';
  const btn = document.getElementById('iq-btn');
  if (btn) { btn.disabled = false; btn.textContent = 'Access Dashboard →'; }
}

// ── Login handler
window._iqLogin = async function() {
  const pw  = (document.getElementById('iq-pw')?.value || '').trim();
  const btn = document.getElementById('iq-btn');
  const err = document.getElementById('iq-err');

  if (!pw) { _iqError('Please enter the demo password.'); return; }
  if (btn)  { btn.disabled = true; btn.textContent = 'Authenticating…'; }
  if (err)  { err.style.display = 'none'; }

  try {
    const r = await fetch('/api/auth', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pw })
    });

    if (!r.ok) {
      const msg = r.status === 401
        ? 'Incorrect password. Please try again.'
        : `Server error (${r.status}). Please contact support.`;
      _iqError(msg);
      return;
    }

    const { token } = await r.json();
    window._IQ_TOKEN = token;

    // Hide login screen
    const screen = document.getElementById('iq-login-screen');
    if (screen) {
      screen.style.transition = 'opacity .4s';
      screen.style.opacity    = '0';
      setTimeout(() => screen.remove(), 400);
    }

    // Load all data from APIs
    await _iqLoadData();

  } catch (e) {
    console.error('Login error:', e);
    _iqError('Network error. Please check your connection.');
  }
};

// ── Authenticated fetch helper
window._iqFetch = async function(url) {
  const r = await fetch(url, {
    headers: { 'x-api-token': window._IQ_TOKEN }
  });
  if (r.status === 401) {
    // Token expired — reload to show login
    window._IQ_TOKEN = null;
    location.reload();
    return null;
  }
  if (!r.ok) throw new Error(`API error ${r.status} from ${url}`);
  return r.json();
};

// ── Score helper — replaces any client-side scoring calls
window._iqScore = async function(type, values) {
  const r = await fetch('/api/score', {
    method:  'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-token':  window._IQ_TOKEN
    },
    body: JSON.stringify({ type, values })
  });
  if (!r.ok) return null;
  return r.json();
};

// ── Load all app data then initialise
window._iqLoadData = async function() {
  try {
    // Show a loading indicator
    document.body.insertAdjacentHTML('beforeend',
      `<div id="iq-loader" style="position:fixed;bottom:18px;right:18px;z-index:8888;
        background:#0e1117;border:1px solid #00c9b1;border-radius:8px;
        padding:10px 16px;color:#00c9b1;font-size:.75rem;font-weight:600;
        font-family:'Segoe UI',sans-serif;box-shadow:0 0 20px rgba(0,201,177,.2)">
        ⚙️ Loading platform data…
      </div>`
    );

    // Fetch data and DB in parallel
    const [XLDATA, DB] = await Promise.all([
      _iqFetch('/api/data'),
      _iqFetch('/api/db')
    ]);

    if (!XLDATA || !DB) return;

    // Expose on window so existing app code can reference them
    window.XLDATA     = XLDATA;
    window.DB         = DB;
    window.RM         = DB.rm;
    window.IOD        = DB.io;
    // PARAM_DEFS also loaded from server (thresholds are server-side only)
    window.PARAM_DEFS = DB.params || [];

    // Now that data is available, run deferred startup routines
    try { initBurdenCalc(); } catch(e) { console.warn('initBurdenCalc:', e); }
    try { if (window.PARAM_DEFS.length) prefill5sHistory(); } catch(e) { console.warn('prefill5sHistory:', e); }
    try { _applyDBSeeds(); } catch(e) { console.warn('_applyDBSeeds:', e); }

    // NOW it is safe to render pages — data is loaded
    try {
      const firstBtn = document.querySelector('nav button');
      show('overview', firstBtn);
    } catch(e) { console.warn('Initial render:', e); }

    // Pre-warm ML engine after a short delay
    setTimeout(()=>{ try{ IronML.run(); }catch(e){} }, 1000);

    // Remove loader
    document.getElementById('iq-loader')?.remove();

    // Trigger app initialisation (existing code calls these after DOM ready)
    if (typeof window._iqAppInit === 'function') {
      window._iqAppInit();
    }

  } catch (err) {
    console.error('Data load error:', err);
    document.getElementById('iq-loader')?.remove();
    document.body.insertAdjacentHTML('beforeend',
      `<div style="position:fixed;bottom:18px;right:18px;z-index:8888;
        background:#1a0808;border:1px solid #ff5252;border-radius:8px;
        padding:10px 16px;color:#ff5252;font-size:.75rem;
        font-family:'Segoe UI',sans-serif">
        ⚠️ Failed to load data. Please refresh.
      </div>`
    );
  }
};

// ── Wrap existing init to defer until data is loaded
// The original app code uses DOMContentLoaded — we intercept it here
const _origAddEventListener = document.addEventListener.bind(document);
let   _domReadyCallbacks    = [];
let   _domReady             = false;

document.addEventListener = function(evt, fn, opts) {
  if (evt === 'DOMContentLoaded') {
    // Queue these — they'll run after we load data
    _domReadyCallbacks.push(fn);
    return;
  }
  return _origAddEventListener(evt, fn, opts);
};

// When actual DOM is ready, store it and show login
_origAddEventListener('DOMContentLoaded', function() {
  _domReady = true;
  // Show the login screen (already injected into HTML above)
});

// After data loads, fire the queued DOMContentLoaded callbacks
const _origIqLoadData = window._iqLoadData;
window._iqLoadData = async function() {
  await _origIqLoadData();
  // Restore native addEventListener
  document.addEventListener = _origAddEventListener;
  // Fire all queued init callbacks
  if (_domReady) {
    _domReadyCallbacks.forEach(fn => {
      try { fn(); } catch(e) { console.warn('Init callback error:', e); }
    });
  }
};

// ════════════════════════════════════════════════════════
//  END SECURE BOOTSTRAP
//  Below: original application rendering code (UI only)
// ════════════════════════════════════════════════════════


// ── Helper: get live param ranges (from sessionStorage overrides if any)
function getParamRanges(){
  let stored = {};
  try {
    const lsData = localStorage.getItem('params5s_data');
    const ssData = sessionStorage.getItem('params5s_data');
    stored = JSON.parse(ssData || lsData || '{}');
  } catch(e){}
  return PARAM_DEFS.map(p => {
    const lo = parseFloat(stored[p.sno+'_lower'] ?? p.lower);
    const hi = parseFloat(stored[p.sno+'_upper'] ?? p.upper);
    return {...p, lower: isNaN(lo)?p.lower:lo, upper: isNaN(hi)?p.upper:hi};
  });
}

// ── Random value within range (smooth walk — correlated to previous)
const _lastVal = {};
function randInRange(sno, lo, hi){
  const range = hi - lo;
  const prev = _lastVal[sno] !== undefined ? _lastVal[sno] : (lo + hi) / 2;
  // Walk up to ±3% of range per step
  const step = (Math.random() - 0.5) * 2 * range * 0.03;
  let next = prev + step;
  // Clamp to range
  next = Math.max(lo, Math.min(hi, next));
  _lastVal[sno] = next;
  return parseFloat(next.toFixed(3));
}

// ── Circular buffer for 5-sec readings (keep last 1440 = 2 hours of readings)
const SEC5_MAX = 1440;
// ringBuf[sno] = array of {v, ts}
const ringBuf = {};
function ensureRingBuf(sno){
  if (sno === undefined || sno === null) return null;
  if (!Array.isArray(ringBuf[sno])) ringBuf[sno] = [];
  return ringBuf[sno];
}
PARAM_DEFS.forEach(p => { if (p) ensureRingBuf(p.sno); });

// ── Pre-fill historical data (2 hours worth of historical 5-sec readings)
function prefill5sHistory(){
  const ranges = getParamRanges();
  const now = Date.now();
  const count = SEC5_MAX; // 2 hours = 1440 readings at 5s
  ranges.forEach(p => {
    const buf = ensureRingBuf(p?.sno);
    if(!buf) return;
    // reset smooth walk seed to midpoint
    _lastVal[p.sno] = (p.lower + p.upper) / 2;
    for(let i = count; i >= 1; i--){
      const ts = new Date(now - i * 5000);
      const v = randInRange(p.sno, p.lower, p.upper);
      if(buf.length >= SEC5_MAX) buf.shift();
      buf.push({v, ts});
    }
  });
}

// ── Compute Moving Average from ringBuf over last N seconds
function computeMA(sno, windowSec){
  const buf = ringBuf[sno];
  if(!buf || buf.length === 0) return null;
  const cutoff = Date.now() - windowSec * 1000;
  const vals = buf.filter(x => x.ts.getTime() >= cutoff).map(x => x.v);
  if(vals.length === 0) return null;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

// ── Build time-bucketed MA history (for table display)
// Returns array of {ts, values:{sno:v,...}}
function buildMAHistory(windowSec, bucketSec, count){
  const ranges = getParamRanges();
  const now = Date.now();
  const rows = [];
  for(let i = count; i >= 0; i--){
    const bucketEnd = now - i * bucketSec * 1000;
    const bucketStart = bucketEnd - windowSec * 1000;
    const ts = new Date(bucketEnd);
    const vals = {};
    ranges.forEach(p => {
      const buf = ringBuf[p.sno];
      if(!buf) { vals[p.sno] = null; return; }
      const slice = buf.filter(x => x.ts.getTime() >= bucketStart && x.ts.getTime() < bucketEnd);
      if(slice.length === 0){
        // fill with random for history
        vals[p.sno] = parseFloat(((p.lower+p.upper)/2 + (Math.random()-0.5)*(p.upper-p.lower)*0.4).toFixed(3));
        vals[p.sno] = Math.max(p.lower, Math.min(p.upper, vals[p.sno]));
      } else {
        vals[p.sno] = parseFloat((slice.reduce((a,b)=>a+b.v,0)/slice.length).toFixed(3));
      }
    });
    rows.push({ts, vals});
  }
  return rows;
}

// ── Live state
let liveTimer = null, liveCD = 5;
let maRefreshTimer = null;
const LP = window.PARAM_DEFS; // alias for backward compat (safe — PARAM_DEFS is pre-declared as [])

// Kick off historical pre-fill — only if PARAM_DEFS has been loaded
if (window.PARAM_DEFS && window.PARAM_DEFS.length) prefill5sHistory();

// Pre-populate _burdenCalc from DB.io so charge seq works before burden page visited
// Deferred — runs after data loads; safe defaults used until then
window._burdenCalc = {
  coke_base: 5000, coke1_kg: 2000, coke2_kg: 3000,
  sinter_kg: 16500, ore_kg: 5500, pellet_kg: 0,
  total_ore_kg: 22000, hm_per_charge: 12.31,
  coke_rate: 406, pci_rate: 150, fuel_rate: 556, charges_hr: 6,
  ts: Date.now(),
};

function initBurdenCalc(){
  if (!window.DB) return;
  const D = DB.io||{};
  const coke1   = D.ref_coke1 || D.coke1 || 2000;
  const coke2   = D.ref_coke2 || D.coke2 || 3000;
  const cb      = coke1 + coke2;
  const oc      = D.ore_coke || 4.4;
  const sinter  = D.sinter || 75;
  const pellet  = D.pellet || 0;
  const ore_pct = Math.max(0, 100 - sinter - pellet - (D.dri||0));
  const sinter_kg = oc * sinter  * cb / 100;
  const ore_kg    = oc * ore_pct * cb / 100;
  const pellet_kg = oc * pellet  * cb / 100;
  const total_ore = sinter_kg + ore_kg + pellet_kg;
  const hm_c      = D.ref_hm || 12.31;
  const chr_in    = D.chr || 6;
  window._burdenCalc = {
    coke_base:    cb,
    coke1_kg:     coke1,
    coke2_kg:     coke2,
    sinter_kg:    sinter_kg,
    ore_kg:       ore_kg,
    pellet_kg:    pellet_kg,
    total_ore_kg: total_ore,
    hm_per_charge: hm_c,
    coke_rate:    D.ref_cr || 406,
    pci_rate:     D.pci    || 150,
    fuel_rate:    D.ref_fr || 556,
    charges_hr:   chr_in,
    ts:           Date.now(),
  };
}

// ── State for dropdown column selections per sheet ──────────────────
 window._MA_SELN = window._MA_SELN || {live5s:60, ma6min:96, ma15min:96, ma2hr:12};

// ── Generate one new 5-sec reading and push to ringBuf
function tick5s(){
  const ranges = getParamRanges();
  const ts = new Date();
  ranges.forEach(p => {
    const buf = ensureRingBuf(p?.sno);
    if(!buf) return;
    const v = randInRange(p.sno, p.lower, p.upper);
    if(buf.length >= SEC5_MAX) buf.shift();
    buf.push({v, ts});
  });
}

// ── Get current (latest) value for a param
function curVal(sno){
  const buf = ringBuf[sno];
  if(!buf || buf.length === 0) return null;
  return buf[buf.length-1].v;
}
function prevVal(sno){
  const buf = ringBuf[sno];
  if(!buf || buf.length < 2) return null;
  return buf[buf.length-2].v;
}

// ── Start / stop live engine
function startLive(){
  if(liveTimer) clearInterval(liveTimer);
  liveCD = 5;
  updateLive();
  updateCountdown();
  liveTimer = setInterval(()=>{
    liveCD--;
    updateCountdown();
    if(liveCD <= 0){
      if(!window.DB) { liveCD = 5; return; }  // data not loaded yet — skip tick
      tick5s();
      // ML self-calibration: append to live log every 5th tick (25s)
      if(typeof IronML!=='undefined'){
        if(!window._mlTickCt) window._mlTickCt=0;
        window._mlTickCt++;
        if(window._mlTickCt%5===0) IronML.run(); // re-trains on new data
      }
      updateLive();
      // Refresh live5s table if visible
      if(document.getElementById('live5s')?.classList.contains('active')){
        renderLive5sTable();
      }
      // Auto-refresh MA sheets if visible (at their own intervals)
      refreshVisibleMA();
      liveCD = 5;
    }
  }, 1000);
}

function stopLive(){
  if(liveTimer){ clearInterval(liveTimer); liveTimer = null; }
  const el = document.getElementById('rcnt');
  if(el) el.innerHTML = '<span class="refresh-ring" style="opacity:.4">⟳ PAUSED</span>';
}

function refreshVisibleMA(){
  const active = document.querySelector('.page.active');
  if(!active) return;
  const id = active.id;
  const now = Date.now();
  // Each MA sheet tracks its last refresh time and only re-renders at its interval
  if(!window._MA_LAST_REFRESH) window._MA_LAST_REFRESH = {};
  const intervals = {ma6min:300000, ma15min:900000, ma2hr:7200000, ma1day:86400000};
  if(intervals[id]){
    const last = window._MA_LAST_REFRESH[id] || 0;
    if(now - last >= intervals[id]){
      window._MA_LAST_REFRESH[id] = now;
      if(id==='ma6min')  rnMA6min();
      if(id==='ma15min') rnMA15min();
      if(id==='ma2hr')   rnMA2hr();
      if(id==='ma1day')  rnMA1day();
    }
    return;
  }
  // prodest refreshes every 5s (uses live MA)
  if(id==='prodest') rnProdEst();
  // Overview KPIs update every 5s (live blast values) — re-compute production
  if(id==='overview'){
    rnProdEst(); // update _liveHMP (24hr charge seq sum)
    // Update production KPI in-place (no full re-render)
    const kvEl  = document.getElementById('ov_hmp');
    const hrEl  = document.getElementById('ov_hmp_hr');
    if(kvEl  && window._liveHMP!=null)  kvEl.textContent  = window._liveHMP.toFixed(1);
    if(hrEl  && window._liveHMHr!=null) hrEl.textContent  = 'T/Day · ' + window._liveHMHr.toFixed(2) + ' T/Hr (latest hr)';
  }
  // shaft and fuelopt refresh every 60s (use charge seq 2-hr avg)
  const slowIds2 = {shaft:60000, fuelopt:60000};
  if(slowIds2[id]){
    const last3 = window._MA_LAST_REFRESH[id] || 0;
    if(now - last3 >= slowIds2[id]){
      window._MA_LAST_REFRESH[id] = now;
      if(id==='shaft')   rnShaft();
      if(id==='fuelopt') rnFuelOpt();
    }
    return;
  }
  // hb2hr and chargeseq refresh every 60s
  const slowIds = {hb2hr:60000, chargeseq:60000};
  if(slowIds[id]){
    const last2 = window._MA_LAST_REFRESH[id] || 0;
    if(now - last2 >= slowIds[id]){
      window._MA_LAST_REFRESH[id] = now;
      if(id==='hb2hr')    rnHeatBal2hr();
      if(id==='chargeseq') rnChargeSeq();
    }
  }
}
function updateCountdown(){
  const el = document.getElementById('rcnt');
  if(el){
    if(liveCD <= 1){ el.innerHTML = '<span class="refresh-ring firing">⟳ REFRESHING</span>'; }
    else { el.innerHTML = `<span class="refresh-ring">⟳ ${liveCD}s</span>`; }
  }
  const cdEl = document.getElementById('cd_live5s');
  if(cdEl) cdEl.textContent = liveCD;
}

function updateLive(){
  const ranges = getParamRanges();
  // Update overview KPIs (backward compat)
  ranges.forEach(p=>{
    const el = document.getElementById('lv_'+p.sno);
    if(!el) return;
    const v = curVal(p.sno), pv = prevVal(p.sno);
    const d = (v!==null && pv!==null) ? v-pv : 0;
    // CBF (sno=1) shown in kNM³/Hr on overview card
    const newVal = (p.sno === 1 && v !== null)
      ? (v/1000).toFixed(1)+'k'
      : (v !== null ? Number(v).toLocaleString('en',{maximumFractionDigits:3}) : '—');
    const changed = (el.textContent !== newVal);
    el.textContent = newVal;
    const dir = Math.abs(d)<0.001 ? 'fl' : d>0 ? 'up' : 'dn';
    el.className = 'kv '+dir;
    if(changed && Math.abs(d)>0.001){
      el.classList.add('val-pop');
      const card = el.closest('.kpi-card')||el.parentElement;
      if(card){ card.classList.remove('kpi-flash'); void card.offsetWidth; card.classList.add('kpi-flash'); }
      setTimeout(()=>el.classList.remove('val-pop'),500);
    }
  });

  // Flash ticker
  const tickerEl = document.getElementById('live-ticker');
  if(tickerEl){ tickerEl.style.borderColor='rgba(0,212,184,.8)';
    setTimeout(()=>{ if(tickerEl) tickerEl.style.borderColor=''; },600); }

  // Timestamp
  const ts_el = document.getElementById('live-ts');
  if(ts_el){ const now=new Date(); ts_el.textContent='Last: '+now.toTimeString().slice(0,8); }

  // Ticker strip
  const ticker = document.getElementById('live-ticker');
  if(ticker) ticker.innerHTML = ranges.slice(0,12).map(p=>{
    const v=curVal(p.sno), pv=prevVal(p.sno);
    const d=(v!==null&&pv!==null)?v-pv:0;
    const cls=Math.abs(d)<0.001?'fl':d>0?'up':'dn';
    return `<div class="tc"><div class="tp">${p.param}</div>
      <div class="tv ${cls}">${v!==null?Number(v).toLocaleString('en',{maximumFractionDigits:3}):'—'}</div>
      <div class="tu">${p.unit}</div>
      <div class="td ${cls}">${d>0?'▲':d<0?'▼':'●'} ${Math.abs(d)<0.001?'stable':f(Math.abs(d),3)}</div></div>`;
  }).join('');

  // Live table (lt_ IDs)
  ranges.forEach(p=>{
    const lt = document.getElementById('lt_'+p.sno);
    if(!lt) return;
    const v = curVal(p.sno);
    if(v !== null){
      // For CBF (sno=1) show kNM format; for O2 show raw
      lt.textContent = Number(v).toLocaleString('en',{maximumFractionDigits:3});
    }
  });
  // Live table
  const tbody = document.getElementById('live-tbody');
  if(tbody) tbody.innerHTML = ranges.map(p=>{
    const v=curVal(p.sno), pv=prevVal(p.sno);
    const d=(v!==null&&pv!==null)?v-pv:0;
    const cls=Math.abs(d)<0.001?'fl':d>0?'up':'dn';
    const mean = ((p.lower+p.upper)/2).toFixed(3);
    const pct = v!==null ? Math.round((v-p.lower)/(p.upper-p.lower)*100) : 0;
    const barW = Math.max(0,Math.min(100,pct));
    return `<tr>
      <td style="color:var(--mu);text-align:center">${p.sno}</td>
      <td>${p.param}</td><td style="color:var(--dm)">${p.unit}</td>
      <td><b style="color:var(--teal)">${v!==null?Number(v).toLocaleString('en',{maximumFractionDigits:3}):'—'}</b>
        <div style="height:2px;background:var(--bg3);border-radius:1px;margin-top:2px">
          <div style="width:${barW}%;height:100%;background:var(--teal);border-radius:1px"></div>
        </div></td>
      <td>${pv!==null?Number(pv).toLocaleString('en',{maximumFractionDigits:3}):'—'}</td>
      <td class="${cls}">${d>0?'▲ ':d<0?'▼ ':'● '}${f(Math.abs(d),3)}</td>
      <td style="color:var(--gold)">${p.lower}</td>
      <td style="color:var(--grn)">${p.upper}</td>
      <td style="color:var(--blu)">${mean}</td>
    </tr>`;
  }).join('');

  // Rolling charts — use last 72 readings from ringBuf
  ['Cold Blast Flow','Hot Blast Pressure','Hot Blast Temperature-1','RAFT',
   'Top Pressure-1','BFGas Generation','Oxygen Enrichment Flow','Total Heat Flux'].forEach(pname=>{
    const pdef = PARAM_DEFS.find(x=>x.param===pname);
    if(!pdef) return;
    const cid = 'lc_'+pname.replace(/[^a-z0-9]/gi,'_');
    const buf = ringBuf[pdef.sno];
    if(!buf || buf.length===0) return;
    const slice = buf.slice(-72);
    const vals = slice.map(x=>x.v);
    const lbls = slice.map(x=>x.ts.toTimeString().slice(0,8));
    if(charts[cid]){
      charts[cid].data.labels = lbls;
      charts[cid].data.datasets[0].data = vals;
      charts[cid].update('none');
    } else {
      const el = document.getElementById(cid);
      if(el) charts[cid] = new Chart(el, {type:'line',
        data:{labels:lbls, datasets:[{data:vals, borderColor:'#00c9b1',
          backgroundColor:'rgba(0,201,177,.06)', tension:.3, pointRadius:0, borderWidth:1.5}]},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{color:'#4a5f75',maxTicksLimit:6,font:{size:8}},grid:{color:'#1c2330'}},
                  y:{ticks:{color:'#4a5f75',font:{size:8}},grid:{color:'#1c2330'}}}}});
    }
  });
}

/* \u2500\u2500 MA Sheet Renderer Helper \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function rnMASheet(pageId, title, icon, windowSec, bucketSec, histCount, timeLabel, color){
  const ranges = getParamRanges();
  const history = buildMAHistory(windowSec, bucketSec, histCount);
  const now = new Date();
  const kc = color || 'var(--teal)';

  // Per-sheet dropdown configs matching backup worksheets
  const SHEET_CFG = {
    'ma6min':  {opts:[[4,'Latest 4 (24 min)'],[8,'Latest 8 (48 min)'],[10,'Latest 10 (1 hr)'],[20,'Latest 20 (2 hr)'],[40,'Latest 40 (4 hr)'],[60,'All 60 (6 hr)']], total:60, shiftSec:360, label:'6-Min'},
    'ma15min': {opts:[[4,'Latest 4 (1 hr)'],[8,'Latest 8 (2 hr)'],[16,'Latest 16 (4 hr)'],[32,'Latest 32 (8 hr)'],[48,'Latest 48 (12 hr)'],[96,'All 96 (1 day)']], total:96, shiftSec:900, label:'15-Min'},
    'ma2hr':   {opts:[[6,'Latest 6 (12 hr)'],[12,'Latest 12 (1 day)'],[24,'Latest 24 (2 days)'],[36,'Latest 36 (3 days)'],[60,'Latest 60 (5 days)'],[132,'All 132 (11 days)']], total:132, shiftSec:7200, label:'2-Hr'}
  };
  const cfg = SHEET_CFG[pageId];
  if(!window._MA_SELN) window._MA_SELN = {};
  const selN = window._MA_SELN[pageId] || histCount;

  // Current MA values from ringBuf
  const curMA = {};
  ranges.forEach(p => { curMA[p.sno] = computeMA(p.sno, windowSec); });

  // KPI strip — first 8 params
  const kpiHtml = ranges.slice(0,8).map(p => {
    const v = curMA[p.sno];
    const pct = v!==null ? ((v-p.lower)/(p.upper-p.lower)*100).toFixed(1) : 0;
    return `<div class="kpi kpi-card" style="min-width:140px;flex:1;border-top:2px solid ${kc}">
      <div class="kl" style="font-size:.6rem">${p.param}</div>
      <div class="kv" style="color:${kc};font-size:1.2rem">${v!==null?Number(v).toFixed(2):'\u2014'}</div>
      <div class="ku">${p.unit}</div>
      <div style="margin-top:5px;height:3px;background:var(--bg3);border-radius:2px">
        <div style="width:${pct}%;height:100%;background:${kc};border-radius:2px;transition:width .5s"></div>
      </div>
      <div style="font-size:.58rem;color:var(--mu);margin-top:2px">${pct}% of range</div>
    </div>`;
  }).join('');

  // Mini-charts — first 4 params
  const chartIds = ranges.slice(0,4).map(p=>({sno:p.sno,param:p.param,unit:p.unit}));
  const chartHtml = `<div class="g2" style="margin-bottom:14px">
    ${chartIds.map(p=>`<div class="card"><h4>${p.param} <span style="color:${kc}">\u2014 ${timeLabel.toUpperCase()} MA</span></h4>
      <div class="cw"><canvas id="mac_${pageId}_${p.sno}"></canvas></div></div>`).join('')}
  </div>`;

  // Controls bar matching backup worksheet style
  const optHtml = cfg ? cfg.opts.map(o=>`<option value="${o[0]}"${o[0]===selN?' selected':''}>${o[1]}</option>`).join('') : '';
  const controlsHtml = cfg ? `
  <div style="display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-bottom:12px;padding:10px 14px;background:#07101e;border:2px solid var(--bdr2);border-radius:6px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--tx);font-weight:700">\ud83d\udcca Columns to show:</span>
      <select id="sel_${pageId}" style="background:#0a1520;color:#f97316;border:2px solid #f97316;border-radius:5px;padding:6px 14px;font-size:13px;font-weight:900;cursor:pointer;outline:none;min-width:200px" onchange="window._MA_SELN['${pageId}']=parseInt(this.value);rnMASheet('${pageId}','${title}','${icon}',${windowSec},${bucketSec},parseInt(this.value),'${timeLabel}','${color}')">
        ${optHtml}
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:4px 10px;background:#031408;border:1px solid var(--grn);border-radius:4px">
      <span id="dot_${pageId}" style="width:10px;height:10px;background:#22c55e;border-radius:50%;transition:all 0.3s;flex-shrink:0"></span>
      <span id="st_${pageId}" style="font-size:11px;color:#22c55e;font-weight:700;min-width:80px">LIVE</span>
    </div>
    <div style="font-size:10px;color:var(--mu)">
      Shift every: <span style="color:#eab308;font-weight:700">${cfg.shiftSec}s</span>
      &nbsp;|&nbsp; Total: <span style="color:${kc};font-weight:700">${cfg.total} slots</span>
    </div>
    <div id="info_${pageId}" style="font-size:9px;color:var(--mu);margin-left:auto">Showing ${selN} of ${cfg.total} slots | Window: ${selN*bucketSec}s</div>
  </div>` : '';

  // Table — latest at left, matching Consolidated bk-page style
  const showN = Math.min(selN, history.length);
  const histSlice = history.slice(-showN).reverse();
  const p2 = n => String(n).padStart(2,'0');
  const MONTHS_MA = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isToday_MA = (d,now) => d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  const isYest_MA  = (d,now) => { const y=new Date(now); y.setDate(y.getDate()-1);
    return d.getDate()===y.getDate()&&d.getMonth()===y.getMonth()&&d.getFullYear()===y.getFullYear(); };

  const thCols = histSlice.map((r,i) => {
    const t   = r.ts;
    const live = i === 0;
    let timeLabel, gapLabel, durLabel;

    if(bucketSec <= 5){          // 5-sec sheet
      timeLabel = live ? 'LATEST '+p2(t.getHours())+':'+p2(t.getMinutes())+':'+p2(t.getSeconds())
                       : 'T-'+(i*5)+'s '+p2(t.getHours())+':'+p2(t.getMinutes())+':'+p2(t.getSeconds());
      gapLabel  = live ? '—' : 'T-'+(i*5)+'s';
      durLabel  = '5s';
    } else if(bucketSec <= 300){ // 5-min MA
      timeLabel = live ? 'LATEST '+p2(t.getHours())+':'+p2(t.getMinutes())
                       : 'T-'+(i*5)+'m '+p2(t.getHours())+':'+p2(t.getMinutes());
      gapLabel  = live ? '—' : 'T-'+(i*5)+'m';
      durLabel  = '5 min';
    } else if(bucketSec <= 900){ // 15-min MA
      const dateStr = isToday_MA(t,now) ? 'Today' : isYest_MA(t,now) ? 'Yest.' : MONTHS_MA[t.getMonth()]+' '+t.getDate();
      timeLabel = dateStr+' '+p2(t.getHours())+':'+p2(t.getMinutes());
      gapLabel  = live ? '—' : 'T-'+(i*15)+'m';
      durLabel  = '15 min';
    } else {                      // 2-hr MA
      const dateStr2 = isToday_MA(t,now) ? 'Today' : isYest_MA(t,now) ? 'Yest.' : '-'+Math.round((now-t)/86400000)+'D';
      timeLabel = dateStr2+' '+p2(t.getHours())+':00';
      gapLabel  = live ? '—' : 'T-'+(i*2)+'hr';
      durLabel  = '2 hr';
    }

    return `<th style="min-width:90px;font-size:.6rem;text-align:center;
        ${live?'color:#22c55e;background:#031408;border-bottom:2px solid #22c55e;':'color:var(--mu)'}">
      <span style="display:block;font-weight:700;font-size:.62rem">${timeLabel}</span>
      <span style="display:block;font-size:.52rem;opacity:.75">Gap: ${gapLabel}</span>
      <span style="display:block;font-size:.52rem;opacity:.6">Dur: ${durLabel}</span>
    </th>`;
  }).join('');

  const COLORS = ['tc-b','tc-o','tc-y','tc-y','','','tc-c','tc-c','tc-c','tc-c','tc-o','tc-o','tc-o','tc-o','tc-r','tc-o','tc-o','tc-o','tc-o','tc-c','tc-y','tc-r','tc-o','tc-o','tc-o','tc-o','tc-o','tc-c','tc-c','tc-c','tc-c','tc-c','tc-c'];
  const tRows = ranges.map((p,pi) => {
    const vc = COLORS[pi] || '';
    const tds = histSlice.map((r,i) => {
      const v = r.vals[p.sno];
      if(v===null||v===undefined) return '<td>\u2014</td>';
      if(i===0) return `<td class="${vc}" style="font-weight:900;background:#031408;border-left:2px solid #22c55e">${Number(v).toFixed(2)}</td>`;
      return `<td>${Number(v).toFixed(2)}</td>`;
    }).join('');
    return `<tr>
      <td style="color:var(--mu);position:sticky;left:0;background:var(--bg2)">${p.sno}</td>
      <td style="white-space:nowrap;font-size:.7rem;text-align:left;position:sticky;left:30px;background:var(--bg2)">${p.param}</td>
      <td style="color:var(--dm);font-size:.65rem;position:sticky;left:200px;background:var(--bg2)">${p.unit}</td>
      ${tds}
    </tr>`;
  }).join('');

  document.getElementById(pageId).innerHTML = `
  <div class="stitle" style="margin-bottom:10px">
    ${icon} ${title}
    <span style="font-size:.67rem;color:var(--mu);font-weight:400;margin-left:10px">
      Auto-refreshes every ${bucketSec>=7200?'2hr':bucketSec>=900?'15min':bucketSec>=300?'5min':'5s'} &nbsp;|&nbsp; Window: ${timeLabel} &nbsp;|&nbsp;
      Last updated: <span id="mats_${pageId}">${now.toTimeString().slice(0,8)}</span>
    </span>
    <span style="margin-left:auto;font-size:.68rem;color:${kc}">\u25cf LIVE</span>
  </div>
  ${kpiHtml.length ? `<div class="krow" style="margin-bottom:14px">${kpiHtml}</div>` : ''}
  ${chartHtml}
  ${controlsHtml}
  <div class="tw" style="max-height:420px">
    <table style="font-size:.72rem">
      <thead>
        <tr>
          <th style="min-width:30px;position:sticky;left:0;z-index:2;background:#0e1117;text-align:center">#</th>
          <th style="min-width:170px;text-align:left;position:sticky;left:30px;z-index:2;background:#0e1117">Parameter</th>
          <th style="min-width:70px;position:sticky;left:200px;z-index:2;background:#0e1117">Unit</th>
          ${thCols}
        </tr>
      </thead>
      <tbody>${tRows}</tbody>
    </table>
  </div>
  <div style="margin-top:8px;font-size:.65rem;color:var(--mu);padding:6px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px">
    \ud83d\udd35 Latest column highlighted green &nbsp;|&nbsp; Values = ${title} of 5-sec readings
  </div>`;

  // Draw mini-charts
  setTimeout(()=>{
    chartIds.forEach(p => {
      const cid = 'mac_'+pageId+'_'+p.sno;
      const el = document.getElementById(cid);
      if(!el) return;
      const hist = history.slice(-40);
      const vals = hist.map(r => r.vals[p.sno]);
      const lbls = hist.map(r => {
        const t = r.ts;
        return t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      });
      if(charts[cid]){ charts[cid].destroy(); delete charts[cid]; }
      charts[cid] = new Chart(el, {
        type:'line',
        data:{labels:lbls, datasets:[{data:vals, borderColor:kc,
          backgroundColor:kc.replace(')',',0.08)').replace('var(--teal)','rgba(0,201,177,0.08)')
            .replace('var(--cyan)','rgba(56,217,245,0.08)').replace('var(--gold)','rgba(255,198,66,0.08)')
            .replace('var(--mag)','rgba(224,64,251,0.08)'),
          tension:.4, pointRadius:0, borderWidth:2}]},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{color:'#4a5f75',maxTicksLimit:8,font:{size:8}},grid:{color:'#1c2330'}},
                  y:{ticks:{color:'#4a5f75',font:{size:9}},grid:{color:'#1c2330'}}}}});
    });
  }, 80);
}

        </thead>
        <tbody>${tRows}</tbody>

}




/* ── ROUTER ──────────────────────────────── */
const rendered=new Set();

/* ═══════════════════════════════════════════════════════════
   🔥 2-HR HEAT BALANCE — Dynamic rolling 12-column sheet
   Columns H1..H12 represent 2-hour windows, latest on left.
   Timestamps auto-calculated from now() anchored to current
   2-hr window boundary, going backward.
   ═══════════════════════════════════════════════════════════ */
function rnHeatBal2hr(){
  if(!DB.hb2hr_rows||!DB.hb2hr_rows.length){
    document.getElementById('hb2hr').innerHTML='<div class="ib" style="color:var(--red)">⚠ Heat Balance data not loaded. Please refresh.</div>';
    return;
  }
  const now = new Date();
  const curBoundaryHour = Math.floor(now.getHours()/2)*2;

  function hLabel(idx){
    const endH   = curBoundaryHour - idx*2;
    const startH = endH - 2;
    const sh = ((startH%24)+24)%24, eh = ((endH%24)+24)%24;
    const pad = n=>String(n).padStart(2,'0');
    return `${pad(sh)}\u2013${pad(eh)}`;
  }
  function dayTag(idx){
    const hoursAgo = idx*2;
    const t = new Date(now - hoursAgo*3600000);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((new Date(t.getFullYear(),t.getMonth(),t.getDate())-today)/86400000);
    if(diff===0) return 'Today';
    if(diff===-1) return 'Yest';
    return `${Math.abs(diff)}d`;
  }

  const rows    = DB.hb2hr_rows;
  const sigmaI  = rows.find(r=>r.id==='ΣI');
  const sigmaO  = rows.find(r=>r.id==='ΣO');
  const netRow  = rows.find(r=>r.id==='O-NET');
  const latestNet = netRow?.h[0]||0;

  // Section order with labels
  const sections = [
    {key:'prod',  label:'📊 PRODUCTION & BURDEN',          idColor:'var(--teal)'},
    {key:'ic',    label:'⚗ INTERMEDIATE CALCULATIONS',     idColor:'var(--blu)'},
    {key:'input', label:'🔴 HEAT INPUT  (Mcal/HMT)',        idColor:'var(--red)'},
    {key:'output',label:'🔵 HEAT OUTPUT  (Mcal/HMT)',       idColor:'var(--or)'},
  ];

  // Column header
  function colHead(){
    let th = '<th style="min-width:55px">ID</th>'
           + '<th style="min-width:180px">Parameter</th>'
           + '<th style="min-width:55px">Unit</th>';
    for(let i=0;i<12;i++){
      const live = i===0;
      th += `<th class="${live?'live-col':''}" style="min-width:72px;text-align:right${live?';color:#22c55e':''}">
        H${i+1}<br><span style="font-size:.5rem;font-weight:400">${hLabel(i)}</span>
        <br><span style="font-size:.46rem;opacity:.6">${dayTag(i)}</span></th>`;
    }
    return `<tr>${th}</tr>`;
  }

  function dataRow(r, idColor){
    const tds = r.h.map((v,i) => {
      const s = v===null||v===undefined?'—':Number(v).toFixed(2);
      return i===0 ? `<td class="live-col" style="text-align:right">${s}</td>`
                   : `<td style="text-align:right">${s}</td>`;

      <td style="color:${idColor};font-weight:700;white-space:nowrap">${r.id}</td>

  function totalRow(r, label, color){

      return `<td class="${cls}" style="text-align:right;color:${c};font-weight:900">${s}</td>`;

      <td style="font-size:.6rem;font-weight:700">True Thermal Loss (Cooling + Radiation)</td>
      <td style="font-size:.58rem;color:var(--mu)">Mcal/HMT</td>

  // KPI bar
  const kpiDefs = [
    {lbl:'HM Production (H1)',id:'HM Prod',unit:'t',c:'var(--teal)'},
    {lbl:'Coke Rate',id:'Coke Rate',unit:'kg/t HM',c:'var(--or)'},
    {lbl:'Fuel Rate',id:'Fuel Rate',unit:'kg/t HM',c:'#f59e0b'},
    {lbl:'Heat Input (ΣI)',id:'ΣI',unit:'Mcal/HMT',c:'var(--red)'},
    {lbl:'Heat Output (ΣO)',id:'ΣO',unit:'Mcal/HMT',c:'#818cf8'},
    {lbl:'Net Balance',id:'O-NET',unit:'Mcal/HMT',c:latestNet<0?'var(--red)':'var(--grn)'},
  ];
  const kpiHtml = kpiDefs.map(k=>{
    const row = rows.find(r=>r.id===k.id);
    const v   = row?row.h[0]:null;
    return `<div class="kpi kpi-card" style="border-top:2px solid ${k.c};flex:1;min-width:120px">
      <div class="kl" style="font-size:.6rem">${k.lbl}</div>
      <div class="kv" style="color:${k.c};font-size:1.1rem">${v!==null&&v!==undefined?Number(v).toFixed(2):'—'}</div>
      <div class="ku">${k.unit}</div></div>`;
  }).join('');

  function sectionTable(secKey, label, idColor, withTotals){
    const secRows = rows.filter(r=>r.sec===secKey);
    let extras = '';
    if(withTotals==='input')  extras = totalRow(sigmaI,'TOTAL HEAT INPUT','var(--teal)');
    if(withTotals==='output') extras = totalRow(sigmaO,'TOTAL HEAT OUTPUT','var(--or)') + netBalRow(netRow);
    return `
    <div class="stitle" style="margin:12px 0 4px">${label}</div>
    <div style="overflow-x:auto">
    <table class="hb-table">
      ${colHead()}
      ${secRows.map(r=>dataRow(r,idColor)).join('')}
      ${extras}
    </table></div>`;
  }

  document.getElementById('hb2hr').innerHTML = `
  <div class="stitle">🔥 2-HR HEAT BALANCE &mdash; Mcal/HMT &nbsp;
    <span style="font-size:.68rem;color:var(--mu);font-weight:400">
      H1 = latest 2-hr window (green) &nbsp;&bull;&nbsp; auto-rolls every 2 hrs &nbsp;&bull;&nbsp; Updated: ${now.toLocaleTimeString()}</span></div>
  <div class="krow" style="flex-wrap:wrap;gap:8px;margin-bottom:14px">${kpiHtml}</div>
  ${sectionTable('prod', '📊 PRODUCTION &amp; BURDEN', 'var(--teal)')}
  ${sectionTable('ic',   '⚗ INTERMEDIATE CALCULATIONS (IC-1 → IC-22)', 'var(--blu)')}
  ${sectionTable('input','🔴 HEAT INPUT', 'var(--red)','input')}
  ${sectionTable('output','🔵 HEAT OUTPUT', 'var(--or)','output')}`;
}


/* ══════════════════════════════════════════════════════════════════
   _rebuildHourlyLog() — recomputes DB.hourly_log + DB.dump_h0 + 
   DB.prod_est from current _burdenCalc values.
   Called at end of calcBurden() and at start of rendering functions
   so every burden change cascades instantly through all pages.
   ══════════════════════════════════════════════════════════════════ */
function _rebuildHourlyLog() {
  if (!window.DB) return;  // data not loaded yet — bail silently
  var bc = window._burdenCalc;
  if (!bc || !bc.coke_base) return;

  var io      = DB.io || {};
  var thi0    = (DB.thi || [])[0] || {};
  var frObj   = DB.fuel_opt || {};

  // Core burden values from live _burdenCalc
  var coke_base    = bc.coke_base;
  var hm_per_chg   = bc.hm_per_charge;
  var total_ore_kg = bc.total_ore_kg;
  var pci_rate     = bc.pci_rate  || (io.pci || 150);
  var nc_rate      = io.nc  || 20;

  // Dump volumes (fixed BF geometry)
  var c_vol_per_dump = 10.0;
  var o_vol_per_dump = 11.111;

  // THI correction
  var thi_val  = thi0.thi_value || 1.0;
  var thi_corr = thi_val > 0 ? 1 / thi_val : 1;

  // Fe-balance correction
  var feAct = (DB.fe_balance || {}).actual_balance || 1;
  var feThe = (DB.fe_balance || {}).theoretical_balance || 1;
  var fe_cf = feThe > 0 ? feAct / feThe : 0.9923;

  // n_C pattern for 168 hours (real historical dump count variation)
  var NC_PATTERN = [7, 6, 6, 6, 7, 6, 6, 7, 7, 7, 7, 7, 6, 7, 6, 6, 7, 6, 6, 7, 7, 7, 7, 7, 7, 6, 7, 6, 6, 7, 6, 6, 7, 7, 6, 7, 7, 7, 6, 6, 6, 7, 7, 7, 6, 6, 7, 7, 7, 6, 6, 6, 7, 7, 6, 7, 6, 7, 7, 7, 7, 7, 6, 7, 7, 6, 6, 7, 7, 6, 7, 7, 7, 6, 7, 7, 7, 7, 6, 6, 6, 6, 6, 7, 7, 7, 6, 7, 6, 6, 6, 7, 7, 6, 6, 6, 7, 6, 7, 7, 6, 6, 7, 6, 7, 7, 6, 6, 7, 7, 6, 7, 7, 6, 6, 7, 7, 7, 7, 6, 7, 7, 7, 6, 7, 6, 7, 6, 6, 7, 6, 6, 7, 7, 7, 7, 6, 7, 7, 6, 7, 6, 7, 7, 7, 6, 6, 7, 7, 7, 6, 6, 7, 7, 7, 7, 6, 7, 7, 6, 6, 6, 7, 7, 6, 7, 6, 7];

  var req_fr_val = frObj.required_fuel_rate || 576.67;
  var coke_per_chg_t = coke_base / 1000;

  // Build each hourly record
  var newLog = [];
  for (var h = 0; h < 168; h++) {
    var n = NC_PATTERN[h] || 7;
    var hm_prod    = hm_per_chg * n;
    var coke_t     = coke_per_chg_t * n;
    var coke_rate  = hm_prod > 0 ? (coke_t / hm_prod) * 1000 : 0;
    var fuel_rate  = coke_rate + pci_rate + nc_rate;
    var vol        = n * (c_vol_per_dump + o_vol_per_dump);
    var corr_cr    = parseFloat((coke_rate * thi_corr).toFixed(2));
    var corr_pr    = parseFloat(pci_rate.toFixed(2));
    var corr_fr    = parseFloat((corr_cr + pci_rate + nc_rate).toFixed(2));
    var vs_fr      = req_fr_val > 0 ? parseFloat((corr_fr / req_fr_val).toFixed(3)) : 1;
    var status     = corr_fr <= req_fr_val ? '🟢 SURPLUS' : '🔴 DEFICIT';
    var corr_hm    = parseFloat((hm_prod * fe_cf).toFixed(3));

    newLog.push({
      hour      : 'H-' + (h + 1),
      hm_prod   : parseFloat(hm_prod.toFixed(3)),
      coke_t    : parseFloat(coke_t.toFixed(1)),
      coke_rate : parseFloat(coke_rate.toFixed(2)),
      pci_rate  : pci_rate,
      fuel_rate : parseFloat(fuel_rate.toFixed(2)),
      vs_fr     : vs_fr,
      vol       : parseFloat(vol.toFixed(2)),
      extra_coke: 0.0,
      status    : status,
      corr_cr   : corr_cr,
      corr_pr   : corr_pr,
      corr_fr   : corr_fr,
      corr_hm   : corr_hm,
      fe_bal_cf : parseFloat(fe_cf.toFixed(4))
    });
  }
  DB.hourly_log = newLog;

  // ── Rebuild dump_h0 ─────────────────────────────────────────────
  var baseDump = DB.dump_h0 || [];
  if (baseDump.length) {
    if (!DB._dump_h0_tpl) DB._dump_h0_tpl = JSON.parse(JSON.stringify(baseDump));
    var tpl     = DB._dump_h0_tpl;
    var numC    = tpl.filter(function(d){ return d.type==='C' && !(d.st||'').includes('empty'); }).length || 7;
    var numO    = tpl.filter(function(d){ return d.type==='O' && !(d.st||'').includes('empty'); }).length || 7;
    var coke_per_dump = parseFloat((coke_base / 1000).toFixed(3));
    var ore_per_dump  = parseFloat((total_ore_kg / 1000 / numO).toFixed(3));
    var hm_per_dump   = parseFloat((hm_per_chg / numO).toFixed(4));

    var rm    = DB.rm || {};
    var rS    = (rm.Sinter  || {}).fe || 57.879;
    var rO    = (rm.Ore     || {}).fe || 62.767;
    var sinter_p = (io.sinter || 75) / 100;
    var ore_p    = 1 - sinter_p - ((io.pellet||0)/100) - ((io.dri||0)/100);
    var fe_blend = (sinter_p * rS + ore_p * rO) / 100;

    DB.dump_h0 = tpl.map(function(d) {
      var d2  = Object.assign({}, d);
      var emp = (d.st || '').includes('empty');
      if (!emp) {
        if (d.type === 'C') {
          d2.coke = coke_per_dump;
          d2.vol  = c_vol_per_dump;
        } else {
          d2.ore = ore_per_dump;
          d2.fe  = parseFloat(fe_blend.toFixed(4));
          d2.hm  = hm_per_dump;
          d2.vol = o_vol_per_dump;
        }
      }
      return d2;
    });
  }

  // ── Update prod_est and overview KPI ───────────────────────────
  var total_hm_24hr = 0;
  var sum_cr = 0, sum_fr = 0;
  for (var i = 0; i < Math.min(24, newLog.length); i++) {
    total_hm_24hr += newLog[i].hm_prod;
    sum_cr += newLog[i].corr_cr;
    sum_fr += newLog[i].corr_fr;
  }
  var avg_cr_24hr = sum_cr / 24;
  var avg_fr_24hr = sum_fr / 24;

  if (DB.prod_est) {
    DB.prod_est.est_hmp_tpd   = parseFloat(total_hm_24hr.toFixed(3));
    DB.prod_est.coke_rate     = parseFloat(avg_cr_24hr.toFixed(3));
    DB.prod_est.fuel_rate     = parseFloat(avg_fr_24hr.toFixed(3));
    DB.prod_est.hm_per_charge = parseFloat(hm_per_chg.toFixed(4));
  }
  window._liveHMP  = parseFloat(total_hm_24hr.toFixed(1));
  window._liveHMHr = parseFloat(newLog[0].hm_prod.toFixed(3));

  // Live-update overview KPI in-place if it's currently visible
  var kvEl = document.getElementById('ov_hmp');
  var hrEl = document.getElementById('ov_hmp_hr');
  if (kvEl)  kvEl.textContent = total_hm_24hr.toFixed(1);
  if (hrEl)  hrEl.textContent = 'T/Day \u00b7 ' + (total_hm_24hr/24).toFixed(2) + ' T/Hr (latest hr)';
}

function rnChargeSeq(){
  // Always rebuild from current _burdenCalc before rendering
  _rebuildHourlyLog();
  if(!DB.hourly_log||!DB.hourly_log.length){
    document.getElementById('chargeseq').innerHTML='<div style="color:var(--red);padding:20px">⚠ Charge data not available.</div>';
    return;
  }
  const now  = new Date();
  const pad  = n=>String(n).padStart(2,'0');
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curH = new Date(now); curH.setMinutes(0,0,0);

  if(!window._CS_HR)   window._CS_HR   = 0;
  if(!window._CS_ROWS) window._CS_ROWS = 24;

  function tsLabel(hoursAgo){
    const t = new Date(curH - hoursAgo*3600000);
    return `${pad(t.getDate())}-${MONTHS[t.getMonth()]}-${t.getFullYear()} ${pad(t.getHours())}:00`;
  }
  function winLabel(hoursAgo){
    const t = new Date(curH - hoursAgo*3600000);
    const e = new Date(t.getTime()+3600000);
    return `${pad(t.getHours())}:00\u2013${pad(e.getHours()%24)}:00`;
  }

  const log   = DB.hourly_log;
  const dump0 = DB.dump_h0||[];
  const feAct_c=(DB.fe_balance&&DB.fe_balance.actual_balance)||1;
  const feThe_c=(DB.fe_balance&&DB.fe_balance.theoretical_balance)||1;
  const fe_cf=feThe_c>0?feAct_c/feThe_c:1;

  // Build hour dropdown: H-0 (current), H-1, H-2 ... H-167
  const hrOpts = log.map((r,i)=>{
    const lbl = i===0 ? `${r.hour} \u25c4 Now (${winLabel(1)})` : `${r.hour}  (${winLabel(i+1)})`;
    return `<option value="${i}"${i===window._CS_HR?' selected':''}>${lbl}</option>`;
  }).join('');

  // KPIs from H-1 (most recent complete hour)
  const h1 = log[0]||{};
  const kpis=[
    {l:'HM Prod (H-1)',v:h1.hm_prod,u:'t/hr',c:'var(--teal)'},
    {l:'Corr. Coke Rate',v:h1.corr_cr,u:'kg/t HM',c:'var(--or)'},
    {l:'Corr. PCI Rate',v:h1.corr_pr,u:'kg/t HM',c:'#f59e0b'},
    {l:'Corr. Fuel Rate',v:h1.corr_fr,u:'kg/t HM',c:'#818cf8'},
    {l:'Total Vol (H-1)',v:h1.vol,u:'m\u00b3',c:'var(--blu)'},
    {l:'Status',v:h1.status||'\u2014',u:'',c:(h1.status||'').includes('SURPLUS')?'var(--grn)':'var(--red)',isStr:true},
  ].map(k=>`<div class="kpi kpi-card" style="border-top:2px solid ${k.c};flex:1;min-width:110px">
    <div class="kl" style="font-size:.58rem">${k.l}</div>
    <div class="kv" style="color:${k.c};font-size:${k.isStr?'.8rem':'1rem'}">${
      k.isStr?k.v:(k.v!=null?Number(k.v).toFixed(2):'—')}</div>
    <div class="ku">${k.u}</div></div>`).join('');

  // Dump detail for selected hour
  const selIdx = window._CS_HR;
  let dumpSection = '';
  if(selIdx === 0 && dump0.length){
    // H-0: show full dump detail from DB.dump_h0
    // Compute burden-calc based hourly totals for consistency with dump detail
  const bc = window._burdenCalc;  // MUST be before bc_hourly_coke (TDZ fix)
  const numC_h = dump0.filter(d=>d.type==='C'&&!((d.st||'').includes('empty'))).length || 7;
  const numO_h = dump0.filter(d=>d.type==='O'&&!((d.st||'').includes('empty'))).length || 7;
  window._cs_bhc = bc ? (bc.coke_base/1000) * numC_h : null;
  window._cs_bhm = bc ? bc.hm_per_charge * numO_h : null;
  // Use _burdenCalc values (±5%) if available, else fall back to DB.dump_h0
  // Per-dump quantities from burden calc (coke per COKE dump, ore per ORE dump)
  // A C dump gets coke_base / (number of C dumps); O dump gets total ore / number of O dumps
  const numC = dump0.filter(d=>d.type==='C'&&!((d.st||'').includes('empty'))).length || 7;
  const numO = dump0.filter(d=>d.type==='O'&&!((d.st||'').includes('empty'))).length || 7;
  // Each C dump = one full charge's coke in TONNES (÷1000 from kg)
  // Each O dump = one full charge's total ore (Sinter+Ore+Pellet+DRI) in TONNES
  const bc_coke_per_dump = bc ? bc.coke_base    / 1000 : null;  // kg→t per C-dump
  const bc_ore_per_dump  = bc ? bc.total_ore_kg / 1000 : null;  // kg→t per O-dump
  const bc_hm_per_dump   = bc ? bc.hm_per_charge       : null;  // already in tonnes
  // ±5% seed per dump index for realistic variation
  function vary5(base, idx){ 
    if(base===null) return null;
    // Deterministic ±5% variation: different per dump, stable per render
    const seed = Math.sin(idx * 2.399) * Math.cos(idx * 0.7 + 1.3);
    const pct  = seed * 0.05; // ±5%
    return Math.max(0, base*(1+pct));
  }
  const dumpRows = dump0.map((d,di)=>{
      const isC=(d.type==='C');
      const stOk=(d.st||'').includes('CO Complete')||(d.st||'').includes('YES');
      const stEm=(d.st||'').includes('empty');
      // Dynamic coke/ore from burden calc ±5%
      let dispCoke, dispOre, dispHm;
      if(stEm){
        dispCoke='—'; dispOre='—'; dispHm='—';
      } else if(isC){
        dispCoke = bc_coke_per_dump!==null ? vary5(bc_coke_per_dump,di).toFixed(1) : (d.coke||'—');
        dispOre='—'; dispHm='—';
      } else {
        dispCoke='—';
        dispOre = bc_ore_per_dump!==null ? vary5(bc_ore_per_dump,di).toFixed(1) : (typeof d.ore==='number'?d.ore.toFixed(2):d.ore||'—');
        dispHm  = bc_hm_per_dump!==null  ? vary5(bc_hm_per_dump,di).toFixed(3)  : (typeof d.hm==='number'?d.hm.toFixed(3):d.hm||'—');
      }
      return `<tr>
        <td style="text-align:center;color:var(--mu)">${d.d}</td>
        <td style="color:${isC?'var(--or)':'var(--teal)'};font-weight:900;text-align:center">${d.type}</td>
        <td style="font-family:monospace;font-size:.65rem">${d.time}</td>
        <td style="text-align:right;color:var(--or)">${dispCoke}</td>
        <td style="text-align:right;color:var(--teal)">${dispOre}</td>
        <td style="text-align:right">${typeof d.fe==='number'?(d.fe*100).toFixed(1)+'%':d.fe||'—'}</td>
        <td style="text-align:right;color:#818cf8">${dispHm}</td>
        <td style="text-align:right">${typeof d.vol==='number'?Number(d.vol).toFixed(2):d.vol||'—'}</td>
        <td style="color:${stOk?'var(--grn)':stEm?'var(--mu)':'var(--or)'};font-size:.6rem">${d.st||'—'}</td>
      </tr>`;
    }).join('');
    dumpSection = `
    <div class="stitle" style="margin-bottom:6px">\u{1F3ED} Charge Dump Detail \u2014 ${log[0]?.hour||'H-1'} (Current Hour) &nbsp;
      <span style="color:var(--mu);font-size:.62rem">${winLabel(1)}</span></div>
    <div style="overflow-x:auto;margin-bottom:14px">
    <table class="hb-table">
      <tr><th style="text-align:center">Dump</th><th style="text-align:center">Type</th><th>Time</th>
        <th style="text-align:right;color:var(--or)">Coke (t)</th>
        <th style="text-align:right;color:var(--teal)">Ore (t)</th>
        <th style="text-align:right">Fe%</th>
        <th style="text-align:right;color:#818cf8">HM Prod (t)</th>
        <th style="text-align:right">Vol (m\u00b3)</th>
        <th>Status</th>
      </tr>
      <tbody>${dumpRows}</tbody>
    </table></div>`;
  } else {
    // Other hours: show summarised hourly row data
    const selRow = log[selIdx]||{};
    const hoursAgo = selIdx + 1;
    dumpSection = `
    <div class="stitle" style="margin-bottom:6px">\u{1F4CA} Hour Summary \u2014 ${selRow.hour||''}
      <span style="color:var(--mu);font-size:.62rem">&nbsp;${tsLabel(hoursAgo)} &nbsp;(${winLabel(hoursAgo)})</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:14px;padding:10px;
      background:var(--bg2);border:1px solid var(--bdr);border-radius:8px">
      ${[['HM Production','hm_prod','t/hr','var(--teal)'],['Coke Charged','coke_t','t','var(--or)'],
         ['Coke Rate','coke_rate','kg/t HM','#f59e0b'],['PCI Rate','pci_rate','kg/t HM','#818cf8'],
         ['Fuel Rate','fuel_rate','kg/t HM','var(--red)'],['Vol','vol','m\u00b3','var(--blu)'],
         ['Corr. Coke Rate','corr_cr','kg/t HM','var(--or)'],
         ['Corr. Fuel Rate','corr_fr','kg/t HM','var(--grn)']].map(([l,k,u,c])=>{
          const v=selRow[k];
          return `<div style="padding:8px;background:var(--bg3);border-radius:6px;border-top:2px solid ${c}">
            <div style="font-size:.6rem;color:var(--mu)">${l}</div>
            <div style="font-size:.95rem;color:${c};font-weight:700">${v!=null?Number(v).toFixed(2):'—'}</div>
            <div style="font-size:.58rem;color:var(--dm)">${u}</div></div>`;
         }).join('')}
    </div>
    <div style="padding:8px 12px;background:rgba(255,150,0,.07);border:1px solid rgba(255,150,0,.3);border-radius:6px;
      font-size:.68rem;color:var(--mu);margin-bottom:14px">
      ℹ\ufe0f Full dump-level detail (Dump#, Type, Time) is available only for H-0 (current hour).
      Historical hours show aggregated production data.
    </div>`;
  }

  // Rolling log controls
  const nRows = window._CS_ROWS;
  const rowOpts=[8,12,24,48,72,120,168].map(v=>
    `<option value="${v}"${v===nRows?' selected':''}>${v} hr${v>=48?' ('+(v/24|0)+'d)':''}</option>`).join('');

  const logRows = log.slice(0,nRows).map((r,i)=>{
    const hoursAgo=i+1;
    const isSurplus=(r.status||'').includes('SURPLUS');
    const isLatest=i===0;
    const _bhc=window._cs_bhc, _bhm=window._cs_bhm;
    const disp_coke = (isLatest && _bhc!=null) ? _bhc.toFixed(2) : Number(r.coke_t).toFixed(2);

function show(id,btn){
  // Show the target page, hide others
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const pageEl = document.getElementById(id);
  if(!pageEl){ console.error('Page not found:',id); return; }
  pageEl.classList.add('active');
  if(btn) btn.classList.add('active');
  // Live ticker
  const livePages=['live5s','overview','ma6min','ma15min','ma2hr','ma1day','hb2hr','chargeseq'];
  if(livePages.includes(id)) startLive(); else stopLive();
  // Cancel animations from other pages
  if(id!=='shaft' && shaftAnimId){cancelAnimationFrame(shaftAnimId);shaftAnimId=null;}
  if(id!=='aerodyn' && aeroAnimId){cancelAnimationFrame(aeroAnimId);aeroAnimId=null;}
  // ALWAYS render — no "already rendered" blocking
  if(!window._MA_LAST_REFRESH) window._MA_LAST_REFRESH={};
  window._MA_LAST_REFRESH[id]=0;
  rendered.add(id);
  renderPage(id);
}
function renderPage(id){
  const m={overview:rnOverview,live5s:rnLive,params5s:rnParams5s,
    ma6min:rnMA6min,ma15min:rnMA15min,ma2hr:rnMA2hr,ma1day:rnMA1day,
    prodest:rnProdEst,burden:rnBurden,
    heatbal:rnHeatBal,hb2hr:rnHeatBal2hr,chargeseq:rnChargeSeq,ws_thi_sheet:rnTHI,ws_da:rnDataAnalysis,ws_ai:rnAI,fuelopt:rnFuelOpt,hmanalysis:rnHM,aerodyn:rnAero,
    febal:rnFeBal,shaft:rnShaft,chemistry:rnChem,anomaly:rnAnomaly};
  if(m[id]){
    try {
      m[id]();
    } catch(e) {
      console.error('renderPage error ['+id+']:',e);
      const el=document.getElementById(id);
      if(el && !el.innerHTML.trim()){
        el.innerHTML='<div style="color:#ff5252;padding:20px;font-family:monospace">'+
          '<b>⚠ Render error on page: '+id+'</b><br>'+e.message+'<br>'+
          '<small style=\'color:#7a90a8\'>'+
          (e.stack||'').split('\n').slice(0,3).join('<br>')+'</small></div>';
      }
    }
  }
}

function rnParams5s(){
  // Parameter data from Excel ⚙ 5-Sec Parameters sheet
  const params5s = (window.PARAM_DEFS || []).map(p => ({
    ...p,
    // amp1/amp2 are simulation walk amplitudes — computed from range, not stored
    amp1: parseFloat(((p.upper - p.lower) * 0.016).toFixed(4)),
    amp2: parseFloat(((p.upper - p.lower) * 0.009).toFixed(4))
  }));

  // Save/load from sessionStorage so edits persist within session
  const storageKey = 'params5s_data';
  let stored = {};
  // Load from localStorage first (cross-session), then sessionStorage (current session)
  try {
    const lsData = localStorage.getItem(storageKey);
    const ssData = sessionStorage.getItem(storageKey);
    // sessionStorage overrides localStorage within same session
    stored = JSON.parse(ssData || lsData || '{}');
  } catch(e){}

  function getVal(sno, field){
    const k = sno+'_'+field;
    if(stored[k] !== undefined) return stored[k];
    const p = params5s.find(x=>x.sno===sno);
    return p ? p[field] : '';
  }
  function saveVal(sno, field, val){
    stored[sno+'_'+field] = val;
    sessionStorage.setItem(storageKey, JSON.stringify(stored));
  }
  function computeMean(sno){
    const lo = parseFloat(getVal(sno,'lower'));
    const hi = parseFloat(getVal(sno,'upper'));
    return isNaN(lo)||isNaN(hi) ? '—' : ((lo+hi)/2).toFixed(4);
  }

  const rows = params5s.map(p=>`
    <tr id="prow_${p.sno}">
      <td style="color:var(--mu);text-align:center">${p.sno}</td>
      <td style="color:var(--tx);font-weight:600;white-space:nowrap">${p.param}</td>
      <td style="color:var(--dm)">${p.unit}</td>
      <td style="background:rgba(255,198,66,.08)">
        <input type="number" step="any" id="p5_lo_${p.sno}" value="${getVal(p.sno,'lower')}"
          style="width:100%;background:transparent;border:none;color:var(--gold);font-size:.78rem;font-weight:700;text-align:right;padding:2px 4px;outline:none"
          oninput="p5UpdateMean(${p.sno})" onblur="p5Save(${p.sno},'lower',this.value)"/>
      </td>
      <td style="background:rgba(0,230,118,.08)">
        <input type="number" step="any" id="p5_hi_${p.sno}" value="${getVal(p.sno,'upper')}"
          style="width:100%;background:transparent;border:none;color:var(--grn);font-size:.78rem;font-weight:700;text-align:right;padding:2px 4px;outline:none"
          oninput="p5UpdateMean(${p.sno})" onblur="p5Save(${p.sno},'upper',this.value)"/>
      </td>
      <td style="background:rgba(41,121,255,.1);text-align:right">
        <span id="p5_mean_${p.sno}" style="color:var(--blu);font-weight:700;font-size:.78rem;padding:0 6px">${computeMean(p.sno)}</span>
      </td>
      <td style="background:rgba(124,77,255,.08)">
        <input type="number" step="any" id="p5_a1_${p.sno}" value="${getVal(p.sno,'amp1')}"
          style="width:100%;background:transparent;border:none;color:var(--pur);font-size:.78rem;font-weight:600;text-align:right;padding:2px 4px;outline:none"
          onblur="p5Save(${p.sno},'amp1',this.value)"/>
      </td>
      <td style="background:rgba(124,77,255,.05)">
        <input type="number" step="any" id="p5_a2_${p.sno}" value="${getVal(p.sno,'amp2')}"
          style="width:100%;background:transparent;border:none;color:var(--mag);font-size:.78rem;font-weight:600;text-align:right;padding:2px 4px;outline:none"
          onblur="p5Save(${p.sno},'amp2',this.value)"/>
      </td>
    </tr>`).join('');

  document.getElementById('params5s').innerHTML=`

    <span style="font-size:.67rem;color:var(--mu);font-weight:400;margin-left:12px">Manual input: Lower Range / Upper Range / Amplitudes &nbsp;|&nbsp; Mean auto-calculated = (Lower + Upper) / 2</span>
    <button onclick="p5ApplyAll()" style="margin-left:8px;background:rgba(0,201,177,.15);color:var(--teal);border:1px solid var(--teal3);border-radius:6px;padding:3px 12px;font-size:.68rem;cursor:pointer;font-weight:700">⟳ Apply to All Sheets</button>

    On next open, all sheets will use the last-saved ranges automatically. &nbsp;|&nbsp;

  </div>

  <div class="tw" style="max-height:calc(100vh - 230px)">

      <thead>
        <tr>
          <th style="width:42px;text-align:center">#</th>

          <th style="width:70px">Unit</th>

          <th style="width:120px;background:rgba(41,121,255,.12);color:var(--blu)">🔷 Mean Value<br><span style="font-weight:400;font-size:.62rem">= (Lo+Hi)/2 — locked</span></th>
          <th style="width:120px;background:rgba(124,77,255,.10);color:var(--pur)">🟣 Amp-1 (120s)<br><span style="font-weight:400;font-size:.62rem">oscillation amplitude</span></th>

    // Reset all MA refresh timestamps so every sheet re-renders immediately on next visit

    if(status){ status.textContent='✓ Ranges saved to local storage (persists across sessions)'; status.style.opacity='1'; }

    rnMASheet('ma15min','15-Minute Moving Average','\ud83d\udcca',900,900,_n15,'15-min','var(--cyan)');

    if(kvEl2 && window._liveHMP != null) kvEl2.textContent = window._liveHMP.toFixed(1);
  };
  window.p5ApplyAll = function(){

    window.p5SaveAll();
  };
  window.p5ResetAll = function(){
    sessionStorage.removeItem(storageKey);
    try{ localStorage.removeItem(storageKey); }catch(e){}
    stored = {};
    prefill5sHistory();
    if(!window._MA_LAST_REFRESH) window._MA_LAST_REFRESH = {};
    ['ma6min','ma15min','ma2hr','ma1day','live5s'].forEach(id => { window._MA_LAST_REFRESH[id] = 0; });

function renderLive5sTable(){
  const tbl = document.getElementById('tbl_live5s');
  if(!tbl) return;
  const n = (window._MA_SELN && window._MA_SELN.live5s) || 60;
  const ranges = getParamRanges();
  const now = new Date();
  const COLORS = ['tc-b','tc-o','tc-y','tc-y','','','tc-c','tc-c','tc-c','tc-c','tc-o','tc-o','tc-o','tc-o','tc-r','tc-o','tc-o','tc-o','tc-o','tc-c','tc-y','tc-r','tc-o','tc-o','tc-o','tc-o','tc-o','tc-c','tc-c','tc-c','tc-c','tc-c','tc-c'];
  const info = document.getElementById('info_live5s');
  if(info) info.textContent = 'Showing '+n+' of 720 slots | Window: '+(n*5)+'s';
  const timeHdrs = [];
  for(let i=0;i<n;i++){
    const t = new Date(now - i*5000);
    timeHdrs.push(i===0 ? 'LATEST '+t.toTimeString().slice(0,8) : 'T-'+(i*5)+'s '+t.toTimeString().slice(0,8));
  }
  let html = '<thead><tr>';
  html += '<th style="min-width:25px;position:sticky;left:0;z-index:2;background:#07101e">#</th>';
  html += '<th style="min-width:160px;text-align:left;position:sticky;left:25px;z-index:2;background:#07101e">Parameter</th>';
  html += '<th style="min-width:70px;position:sticky;left:185px;z-index:2;background:#07101e">Unit</th>';
  for(let i=0;i<n;i++){
    const lv5=(i===0);
    html += '<th style="min-width:105px;font-size:.6rem;text-align:center;'+
      (lv5?'color:#22c55e;background:#031408;border-bottom:2px solid #22c55e;':'color:var(--mu)')+'">'+
      '<span style="display:block;font-weight:700;font-size:.62rem">'+timeHdrs[i]+'</span>'+
      '<span style="display:block;font-size:.52rem;opacity:.75">Gap: '+(lv5?'—':'T-'+(i*5)+'s')+'</span>'+
      '<span style="display:block;font-size:.52rem;opacity:.6">Dur: 5s</span>'+
      '</th>';
  }
  html += '</tr></thead><tbody>';
  ranges.forEach((p,pi) => {
    const vc = COLORS[pi] || '';
    const buf = ringBuf[p.sno] || [];
    html += '<tr>';
    html += `<td style="color:var(--dm);position:sticky;left:0;background:var(--bg2)">${p.sno}</td>`;
    html += `<td style="text-align:left;position:sticky;left:25px;background:var(--bg2)">${p.param}</td>`;
    html += `<td style="color:var(--mu);position:sticky;left:185px;background:var(--bg2)">${p.unit}</td>`;
    for(let vi=0;vi<n;vi++){
      const idx = buf.length - 1 - vi;
      const val = idx >= 0 ? buf[idx].v : null;
      const vs = val !== null ? Number(val).toFixed(2) : '\u2014';
      if(vi===0){ html += `<td class="${vc}" style="font-weight:900;background:#031408;border-left:2px solid #22c55e">${vs}</td>`; }
      else { html += `<td>${vs}</td>`; }
    }
    html += '</tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}



/* ── PRODUCTION ESTIMATOR ────────────────── */
function rnProdEst(){
  // Sync prod_est with current burden before rendering
  _rebuildHourlyLog();
  const pe  = DB.prod_est;
  const d   = (DB.hm_daily||[]).slice(0,15).reverse();
  const hl  = DB.hourly_log||[];

  // ── 2-Hr average Coke Rate & PCI Rate from Charge Sequence (DB.hourly_log)
  const h2slice = hl.slice(0,2);
  const avg_cr  = h2slice.length ? h2slice.reduce((s,r)=>s+(r.corr_cr||0),0)/h2slice.length : pe.coke_rate;
  const avg_pr  = h2slice.length ? h2slice.reduce((s,r)=>s+(r.corr_pr||0),0)/h2slice.length : pe.pci_rate;
  const avg_fr  = h2slice.length ? h2slice.reduce((s,r)=>s+(r.corr_fr||0),0)/h2slice.length : 0;

  // ── BLAST PARAMETERS: use DB actual plant values (not simulated ring buffer)
  //    Ring buffer is only for trend visualization — it resets when range changes
  //    Actual production must be based on real plant cold blast from DB
  const db_cbf = pe.cold_blast    || 87543.592;   // Nm³/Hr from DB (actual plant)
  const db_o2  = pe.o2_injection  || 5513.208;    // Nm³/Hr O2 injection from DB
  const db_hbt = pe.hbt           || 1106.4;
  const db_hum = pe.humidity      || 27.9;

  // ── Ring buffer MAs (for display only — shows trend relative to DB base)
  const WIN2HR  = 7200;
  const ma_cbf  = computeMA(1, WIN2HR);
  const ma_o2f  = computeMA(5, WIN2HR);
  const ma_hbt  = computeMA(3, WIN2HR) || db_hbt;
  const ma_hum  = computeMA(6, WIN2HR) || db_hum;

  // ── CORRECT Production Formula (matching Excel BF Production Estimator):
  //    Production (T/Hr) = Total_Physical_Blast / Physical_Wind_per_THM
  //    Total_Physical_Blast = Cold_Blast + O2_Injection
  //    Physical_Wind_per_THM = 1267.13 Nm³/THM (from Excel row 38)
  const phys_wind_thm = pe.wind_per_thm || 1267.1287965932877;

  // Primary: use DB actual plant values → gives 1762.54 T/Day (matches Excel)
  const total_blast_db = db_cbf + db_o2;
  const prod_hr_db     = total_blast_db / phys_wind_thm;
  const prod_tpd_db    = prod_hr_db * 24;

  // What-If: if ring buffer has been prefilled with new range, show scenario estimate
  const ring_cbf    = ma_cbf || db_cbf;
  const ring_o2     = ma_o2f || db_o2;
  const total_blast_ring = ring_cbf + ring_o2;
  const prod_tpd_ring    = total_blast_ring / phys_wind_thm * 24;

  // Use DB-based production as primary (real plant)
  // If ring buffer differs significantly from DB (>5%), treat as simulation mode
  const cbf_ratio = ma_cbf ? ma_cbf / db_cbf : 1;
  const isSimulation = Math.abs(cbf_ratio - 1) > 0.05;
  // Use ring buffer when CBF differs >5% from DB (SIMULATION mode)
  // Otherwise use DB 2-Hr MA values (verified against Excel: 1762.54 T/Day)
  // Ring buf CBF 113k → isSimulation=TRUE → prod=2249 T/Day
  // DB CBF 87.5k → isSimulation=FALSE → prod=1762 T/Day
  const prod_tpd_co = isSimulation ? prod_tpd_ring : prod_tpd_db;
  const prod_hr_co  = prod_tpd_co / 24;

  // O2% calculation
  const total_blast  = isSimulation ? total_blast_ring : total_blast_db;
  const ma_cbf_disp  = isSimulation ? ring_cbf : db_cbf;
  const ma_o2f_disp  = isSimulation ? ring_o2  : db_o2;
  const o2_pct = total_blast > 0 ? (ma_o2f_disp + 0.21*ma_cbf_disp)/total_blast * 100 : 25.68;

  // ── C-O Balance (per THM) — using 2-Hr avg rates from charge sequence
  const C_coke_pct = 87; const C_nut_pct = 75; const C_pci_pct = 65;
  const nut_coke_rate = pe.nut_coke_rate || 20;
  const C_HM = pe.c_hm || 4.2194; const C_DR = pe.c_dr || 102;
  const C_from_coke = avg_cr * C_coke_pct / 100;
  const C_from_nut  = nut_coke_rate * C_nut_pct / 100;
  const C_from_pci  = avg_pr * C_pci_pct / 100;
  const C_total_in  = C_from_coke + C_from_nut + C_from_pci;
  const C_tuyere    = C_total_in - C_HM - C_DR;

  // ── Fe-Balance correction factor
  const fe_actual_bal = (DB.fe_balance && DB.fe_balance.actual_balance)      || 1;
  const fe_theo_bal   = (DB.fe_balance && DB.fe_balance.theoretical_balance) || 1;
  const fe_corr_factor = fe_theo_bal > 0 ? fe_actual_bal / fe_theo_bal : 1;

  // ── Final production values
  const live_hm_rate   = hl.length>0 && typeof hl[0].hm_prod==='number' ? hl[0].hm_prod : prod_hr_co;
  // Primary display = DB-based production (1762 T/Day) — not ring buffer simulation
  window._liveHMP    = prod_tpd_co;   // Correct production (ring buf if simulation)
  window._liveHMHr   = hl[0]?.hm_prod || prod_hr_db;
  window._liveHMP_co = prod_tpd_co;   // What-if (same as DB unless simulation mode)

  const simTag = isSimulation
    ? `<span style="font-size:.58rem;color:var(--or);background:rgba(255,150,0,.15);
        border:1px solid var(--or);border-radius:3px;padding:1px 6px;margin-left:6px">
        ⚡ SIMULATION — CBF ${(cbf_ratio*100).toFixed(0)}% of plant</span>` : '';

  document.getElementById('prodest').innerHTML=`
  <div class="stitle">🏭 BF PRODUCTION ESTIMATOR — C-O Balance &nbsp;|&nbsp;
    <span style="font-size:.67rem;color:var(--mu);font-weight:400">
      Coke Rate &amp; PCI Rate from 2-Hr avg of Charge Sequence &nbsp;·&nbsp;
      CBF from DB actual plant values ${simTag}</span></div>
  <div class="krow">
    <div class="kpi t kpi-card" style="min-width:180px">
      <div class="kl">${isSimulation?"Est. HM Production (SIMULATION)":"Est. HM Production (DB-based)"}</div>
      <div class="kv fl" id="ov_prodest_hmp" style="font-size:1.85rem;color:${isSimulation?'#ff9800':'var(--teal)'}">${f(prod_tpd_co,1)}</div>
      <div class="ku">T/Day &nbsp;·&nbsp; ${f(prod_hr_co,2)} T/Hr</div>
      ${isSimulation
        ?`<div style="font-size:.58rem;color:var(--teal);margin-top:2px">DB design: ${f(prod_tpd_db,1)} T/Day | CBF ${fk(ring_cbf)} Nm³/Hr</div>`
        :`<div style="font-size:.58rem;color:var(--mu);margin-top:2px">DB 2-Hr MA: CBF ${fk(db_cbf)} Nm³/Hr</div>`
      }
    </div>
    <div class="kpi a kpi-card">
      <div class="kl">Cold Blast ${isSimulation?'(Ring Buf)':'(DB Actual)'}</div>
      <div class="kv">${fk(ma_cbf_disp)}</div><div class="ku">kNm³/Hr</div>
      ${!isSimulation?`<div style="font-size:.55rem;color:var(--mu)">DB: ${fk(db_cbf)}</div>`:''}
    </div>
    <div class="kpi g kpi-card"><div class="kl">O₂ Injection</div>
      <div class="kv">${fk(ma_o2f_disp)}</div><div class="ku">kNm³/Hr</div></div>
    <div class="kpi m kpi-card"><div class="kl">Total Physical Blast</div>
      <div class="kv">${fk(total_blast)}</div><div class="ku">kNm³/Hr</div></div>
    <div class="kpi b kpi-card"><div class="kl">O₂% of Blast</div>
      <div class="kv">${f(o2_pct,2)}</div><div class="ku">%</div></div>
    <div class="kpi a kpi-card"><div class="kl">HBT (2-Hr MA)</div>
      <div class="kv">${f(ma_hbt,1)}</div><div class="ku">°C</div></div>
    <div class="kpi t kpi-card"><div class="kl">Physical Wind/THM</div>
      <div class="kv">${f(phys_wind_thm,1)}</div><div class="ku">Nm³/THM</div></div>
    <div class="kpi m kpi-card"><div class="kl">RAFT</div>
      <div class="kv">${f(pe.raft_actual,1)}</div><div class="ku">°C</div></div>

  <div class="g2">

      <div class="stitle cyan">⚗ C-O Balance (per THM)</div>
      ${[['C from Coke',C_from_coke],['C from Nut Coke',C_from_nut],
